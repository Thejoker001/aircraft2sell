/* Retourne la liste des marques triées */
function getAircraftMakes(catFilter) {
  const makes = Object.keys(AIRCRAFT_DB);
  if(!catFilter || catFilter === 'all') return makes.sort();
  return makes.filter(m => AIRCRAFT_DB[m].cat === catFilter).sort();
}

/* Retourne les modèles d'une marque */
function getAircraftModels(make) {
  return AIRCRAFT_DB[make] ? AIRCRAFT_DB[make].models : [];
}

/* Retourne la catégorie d'une marque */
function getAircraftCat(make) {
  return AIRCRAFT_DB[make] ? AIRCRAFT_DB[make].cat : 'light';
}



/* ── AIRCRAFT DB CASCADE SEARCH ── */
function initSearchAircraft() {
  if (!window.AIRCRAFT_DB) {
    setTimeout(initSearchAircraft, 100);
    return;
  }
  var makes = Object.keys(window.AIRCRAFT_DB).sort();
  var opts = '<option value="">Toutes marques</option>'
    + makes.map(function(m){ return '<option value="'+m+'">'+m+'</option>'; }).join('');
  
  var topMake    = document.getElementById('searchMake');
  var sbarMake   = document.getElementById('sidebarMake');
  if (topMake)  topMake.innerHTML  = opts;
  if (sbarMake) sbarMake.innerHTML = '<option value="">Toutes marques</option>'
    + makes.map(function(m){ return '<option value="'+m+'">'+m+'</option>'; }).join('');
}

function populateModelSelect(makeVal, modelSelId) {
  var modelSel = document.getElementById(modelSelId);
  if (!modelSel) return;
  if (!makeVal || !window.AIRCRAFT_DB || !window.AIRCRAFT_DB[makeVal]) {
    modelSel.innerHTML = '<option value="">Tous modèles</option>';
    modelSel.disabled = true;
    return;
  }
  var models = window.AIRCRAFT_DB[makeVal].models;
  modelSel.innerHTML = '<option value="">Tous modèles</option>'
    + models.map(function(m){ return '<option value="'+m+'">'+m+'</option>'; }).join('');
  modelSel.disabled = false;
}

function onSearchMakeChange() {
  var make = (document.getElementById('searchMake') || {}).value || '';
  populateModelSelect(make, 'searchModel');
  // Sync sidebar
  var sb = document.getElementById('sidebarMake');
  if (sb && sb.value !== make) { sb.value = make; onSidebarMakeChange(true); }
  renderCards();
}

function onSidebarMakeChange(fromTop) {
  var make = (document.getElementById('sidebarMake') || {}).value || '';
  populateModelSelect(make, 'sidebarModel');
  // Sync top bar
  if (!fromTop) {
    var top = document.getElementById('searchMake');
    if (top && top.value !== make) { top.value = make; populateModelSelect(make, 'searchModel'); }
  }
}

let lang='en', viewMode='grid', currentPage=1;
const PER_PAGE=9;
function t(k){return(T[lang]&&T[lang][k])||(T.en[k])||k}
// Charger les annonces publiées depuis localStorage
function loadLiveListings(){
  try {
    var all = JSON.parse(localStorage.getItem('a2s_listings')||'[]');
    return all.filter(function(l){ return l.status==='live'; });
  } catch(e){ return []; }
}
var MOCK = loadLiveListings();


function toggleSearchFav(btn, id){
  if(!window.A2SFavs) return;
  // Build a minimal listing object from the card
  const card = btn.closest('.result-card') || btn.closest('[class*="card"]');
  const listing = {
    id: String(id),
    title: card ? (card.querySelector('.rc-title,h3,h4') || {}).textContent || '' : '',
    price: card ? (card.querySelector('.rc-price') || {}).textContent || '' : '',
    thumb: '✈'
  };
  const added = window.A2SFavs.toggle(listing);
  btn.classList.toggle('liked', added);
  const icon = btn.querySelector('.fav-icon');
  if(icon) icon.textContent = added ? '♥' : '♡';
  showToast(added ? (t('toast_fav')||'Ajouté aux favoris !') : 'Retiré des favoris');
}

function toggleMobileFilters(){

function renderCards(){
  const g=document.getElementById('resultsGrid');

  }

  const grid=document.getElementById('cardsGrid');
  grid.className='cards-grid'+(viewMode==='list'?' list-view':'');
  const start=(currentPage-1)*PER_PAGE, end=Math.min(start+PER_PAGE,MOCK.length); LISTINGS=MOCK;
  var items = MOCK.slice(start, end);
  grid.innerHTML = items.map(function(c,i){
    var sym = {EUR:'€',USD:'$',GBP:'£',CHF:'Fr'}[c.currency||'EUR']||'€';
    var price = c.price ? sym+Number(c.price).toLocaleString() : '—';
    var title = c.title || [c.make,c.model,c.year?'('+c.year+')':''].filter(Boolean).join(' ') || 'Annonce';
    var cat   = c.category || c.cat || '—';
    var loc   = c.airport || c.loc || c.location || '—';
    var cid   = String(c.id||i);
    return '<div class="result-card" onclick="window.location.href=\'listing.html?id='+cid+'\'">'
      +'<div class="rc-img">'
      +'<span style="font-size:3.5rem;opacity:.2">'+(c.icon||'✈')+'</span>'
      +'<button class="rc-fav-btn" data-id="'+cid+'" onclick="event.stopPropagation();toggleSearchFav(this,\''+cid+'\',\''+encodeURIComponent(c.make||'')+'\',\''+encodeURIComponent(c.model||'')+'\',\''+encodeURIComponent(c.year||'')+'\',\''+encodeURIComponent(c.price||'')+'\',\''+encodeURIComponent(loc)+'\')">♡</button>'
      +'</div>'
      +'<div class="rc-body">'
      +'<div class="rc-cat">'+cat+'</div>'
      +'<div class="rc-title">'+title+'</div>'
      +'<div class="rc-specs">'
      +(c.year?'<span class="rc-spec">📅 '+c.year+'</span>':'')
      +(c.views!==undefined?'<span class="rc-spec">👁 '+c.views+' vues</span>':'')
      +'</div>'
      +(c.sellerName?'<div class="rc-trust">✓ '+c.sellerName+'</div>':'')
      +'<div class="rc-ft">'
      +'<div class="rc-price">'+price+'</div>'
      +'<div class="rc-loc">📍 '+loc+'</div>'
      +'</div>'
      +'</div>'
      +'</div>';
  }).join('');
  renderPagination();
}
function renderPagination(){
  const total=Math.ceil(MOCK.length/PER_PAGE);
  let html='';
  if(currentPage>1) html+=`<button class="pg-btn" onclick="goPage(${currentPage-1})">${t('prev_page')}</button>`;
  for(let i=1;i<=total;i++) html+=`<button class="pg-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  if(currentPage<total) html+=`<button class="pg-btn" onclick="goPage(${currentPage+1})">${t('next_page')}</button>`;
  document.getElementById('pagination').innerHTML=html;
}
function goPage(p){currentPage=p;renderCards();window.scrollTo({top:200,behavior:'smooth'});}

function removeFilter(el){el.parentElement.remove();}
function doSearch(){
  MOCK = loadLiveListings();
  var q     = (document.getElementById('searchQ')||{}).value||'';
  var cat   = (document.getElementById('searchCat')||{}).value||'';
  var make  = (document.getElementById('searchMake')||{}).value||'';
  var model = (document.getElementById('searchModel')||{}).value||'';
  var country=(document.getElementById('searchCountry')||{}).value||'';
  MOCK = MOCK.filter(function(l){
    if(cat   && l.category!==cat)   return false;
    if(make  && l.make!==make)      return false;
    if(model && l.model!==model)    return false;
    if(country && l.country!==country) return false;
    if(q){
      var t2 = [l.make,l.model,l.title,l.year,l.airport,l.category].join(' ').toLowerCase();
      if(!t2.includes(q.toLowerCase())) return false;
    }
    return true;
  });
  currentPage=1;
  renderCards();
  showToast(MOCK.length+' annonce'+(MOCK.length>1?'s':'')+' trouvée'+(MOCK.length>1?'s':''));
}
const CURR_SYMBOLS={EUR:'€',USD:'$',GBP:'£',CHF:'Fr',CAD:'CA$',AUD:'AU$',JPY:'¥',CNY:'¥',SEK:'kr',NOK:'kr',DKK:'kr',PLN:'zł',CZK:'Kč',HUF:'Ft',TRY:'₺',BRL:'R$',AED:'د.إ',SAR:'﷼',INR:'₹',SGD:'S$',NZD:'NZ$',HKD:'HK$',ZAR:'R'};
let searchCurrency = 'EUR';
let searchExRate = 1;

async function fetchSearchRate(from, to){
  if(from === to){ searchExRate=1; return; }
  try {
    const r = await fetch('https://api.frankfurter.app/latest?base='+from+'&symbols='+to);
    const d = await r.json();
    searchExRate = d.rates[to] || 1;
  } catch(e){ searchExRate=1; }
}

function displayPrice(priceEur){
  if(!priceEur || priceEur === '—') return '—';
  const sym = CURR_SYMBOLS[searchCurrency] || searchCurrency;
  const converted = Math.round(Number(priceEur) * searchExRate);
  return sym + converted.toLocaleString();
}

function updateCurrencyLabel(){
  const sel = document.getElementById('searchCurr');
  if(!sel) return;
  const code = sel.value;
  const sym = CURR_SYMBOLS[code] || code;
  searchCurrency = code;
  const badge = document.getElementById('filterCurrBadge');
  if(badge) badge.textContent = sym;
  // Update filter_price label
  document.querySelectorAll('[data-i18n="filter_price"]').forEach(el => {
    el.textContent = t('filter_price');
  });
  fetchSearchRate('EUR', code).then(()=>renderCards());
}

function initSearchMakeModel() {
  const makes = window.getAircraftMakes('');
  const optsMake = '<option value="">Toutes marques</option>'
    + makes.map(m => `<option value="${m}">${m}</option>`).join('');
  const smake = document.getElementById('searchMake');
  const sbmake = document.getElementById('sidebarMake');
  if(smake) smake.innerHTML = optsMake;
  if(sbmake) sbmake.innerHTML = '<option value="">Toutes les marques</option>'
    + makes.map(m => `<option value="${m}">${m}</option>`).join('');
}

function onSearchMakeChange() {
  const makeSel  = document.getElementById('searchMake');
  const modelSel = document.getElementById('searchModel');
  if(!makeSel || !modelSel) return;
  const make = makeSel.value;
  if(!make) {
    modelSel.innerHTML = '<option value="">Tous modèles</option>';
    modelSel.disabled = true;
    return;
  }
  const models = window.getAircraftModels(make);
  modelSel.innerHTML = '<option value="">Tous modèles</option>'
    + models.map(m => `<option value="${m}">${m}</option>`).join('');
  modelSel.disabled = false;
  // Sync sidebar
  const sbmake = document.getElementById('sidebarMake');
  if(sbmake) { sbmake.value = make; onSidebarMakeChange(); }
  renderCards();
}

function onSidebarMakeChange() {
  const makeSel  = document.getElementById('sidebarMake');
  const modelSel = document.getElementById('sidebarModel');
  if(!makeSel || !modelSel) return;
  const make = makeSel.value;
  if(!make) {
    modelSel.innerHTML = '<option value="">Tous les modèles</option>';
    modelSel.disabled = true;
    return;
  }
  const models = window.getAircraftModels(make);
  modelSel.innerHTML = '<option value="">Tous les modèles</option>'
    + models.map(m => `<option value="${m}">${m}</option>`).join('');
  modelSel.disabled = false;
  // Sync top bar
  const smake = document.getElementById('searchMake');
  if(smake) { smake.value = make; onSearchMakeChange(); }
}

// Read URL params and pre-fill search
(function(){
  const params = new URLSearchParams(window.location.search);
  const cat = params.get('cat');
  const q   = params.get('q');
  if(q){
    const qi = document.getElementById('searchQ');
    if(qi) qi.value = decodeURIComponent(q);
  }
  if(cat){
    const decoded = decodeURIComponent(cat);
    // Map category names to select option values
    const catMap = {
      // EN
      'Light aircraft':'light','Helicopters':'heli','Business jets':'jet',
      'Turboprops':'turbo','Ultralight / ULM':'ulm','Airliners':'airliner',
      'Spare parts':'parts',
      // FR
      'Avions légers':'light','Hélicoptères':'heli',"Jets d'affaires":'jet',
      'Turbopropulseurs':'turbo','ULM':'ulm','Avions de ligne':'airliner',
      'Pièces détachées':'parts',
      // DE
      'Leichtflugzeuge':'light','Hubschrauber':'heli','Geschäftsreisejets':'jet',
      'Turboprops':'turbo','Ultraleicht':'ulm','Verkehrsflugzeuge':'airliner',
      'Ersatzteile':'parts',
      // ES
      'Aviones ligeros':'light','Helicópteros':'heli','Jets ejecutivos':'jet',
      'Turbohélices':'turbo','Ultraligero':'ulm','Aeronaves comerciales':'airliner',
      'Repuestos':'parts',
    };
    const sel = document.getElementById('searchCat');
    const val = catMap[decoded];
    if(sel && val){
      for(let i=0;i<sel.options.length;i++){
        if(sel.options[i].value===val){ sel.selectedIndex=i; break; }
      }
    }
    // Also show active filter tag
    const af = document.getElementById('activeFilters');
    if(af && decoded){
      af.innerHTML = '<div class="af-tag"><span>'+decoded+'</span><span class="af-remove" onclick="this.parentElement.remove()">✕</span></div>';
    }
    // Update result count label
    const rc = document.getElementById('resultCount');
    if(rc) rc.textContent = '0';
  }
})();

if(document.readyState === "loading"){
