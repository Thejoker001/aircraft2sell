<html lang="fr">
<head>
<meta charset="UTF-8">

<meta property="og:description" content="Des centaines d'annonces d'avions et hélicoptères en Europe. Filtrez par catégorie, budget et localisation.">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Rechercher des aéronefs — Aircraft2Sell">
<meta name="twitter:description" content="Des centaines d'annonces d'avions et hélicoptères en Europe. Filtrez par catégorie, budget et localisation.">
<meta name="description" content="Recherchez parmi des centaines d'annonces d'aéronefs en Europe. Avions légers, jets d'affaires, hélicoptères, turbopropulseurs, ULM — sans commission.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600&display=swap" rel="stylesheet">
<style>
:root{--bg:#05080f;--deep:#030610;--surface:#0a1020;--card:#0c1428;--card2:#0f1830;--border:rgba(180,200,230,.08);--border2:rgba(180,200,230,.14);--accent:#e8a020;--gold:#f5c518;--mist:#7a93aa;--mist2:#3d5468;--white:#edf2f8;--dim:#c8d8e8;--green:#22c55e;--red:#ef4444}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
img{max-width:100%;height:auto}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--white);-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* ── SEARCH HEADER ── */
.search-header{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 2rem}
.sh-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.sh-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.06em;color:var(--white);flex-shrink:0}
.sh-count{font-size:.72rem;color:var(--mist);flex:1}
.sort-select{background:rgba(255,255,255,.04);border:1px solid var(--border2);color:var(--mist);font-family:'DM Sans',sans-serif;font-size:.76rem;padding:.4rem .7rem;outline:none;cursor:pointer;appearance:none}
.sort-select option{background:var(--deep)}
.view-btns{display:flex;gap:2px}
.vbtn{background:rgba(255,255,255,.04);border:1px solid var(--border2);color:var(--mist);width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.85rem;transition:all .15s}
.vbtn.active,.vbtn:hover{background:rgba(232,160,32,.1);border-color:rgba(232,160,32,.2);color:var(--accent)}

/* ── LAYOUT ── */
.search-layout{max-width:1400px;margin:0 auto;padding:1.5rem 2rem;display:grid;grid-template-columns:260px 1fr;gap:1.5rem;align-items:start}

/* ── SIDEBAR ── */
.sidebar{position:sticky;top:76px}
.filter-group{margin-bottom:1.5rem}
.fg-title{font-size:.62rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--mist2);margin-bottom:.8rem;padding-bottom:.6rem;border-bottom:1px solid var(--border)}
.filter-cats{display:flex;flex-direction:column;gap:2px}
.fcat{display:flex;align-items:center;justify-content:space-between;padding:.5rem .6rem;cursor:pointer;transition:background .15s;border:1px solid transparent}
.fcat:hover{background:rgba(255,255,255,.03)}
.fcat.active{background:rgba(232,160,32,.06);border-color:rgba(232,160,32,.15)}
.fcat-left{display:flex;align-items:center;gap:.6rem;font-size:.8rem;color:var(--dim)}
.fcat.active .fcat-left{color:var(--white)}
.fcat-dot{width:6px;height:6px;border-radius:50%;background:var(--mist2);flex-shrink:0;transition:background .15s}
.fcat.active .fcat-dot{background:var(--accent)}
.fcat-count{font-size:.62rem;color:var(--mist2)}
.range-row{display:flex;gap:.5rem;align-items:center}
.range-inp{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--border2);color:var(--white);font-family:'DM Sans',sans-serif;font-size:.8rem;padding:.5rem .65rem;outline:none;transition:border-color .2s;min-width:0}
.range-inp:focus{border-color:rgba(232,160,32,.4)}
.range-inp::placeholder{color:var(--mist2)}
.range-sep{font-size:.7rem;color:var(--mist2);flex-shrink:0}
.btn-apply{width:100%;background:var(--accent);color:var(--deep);border:none;padding:.65rem;font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:.1em;cursor:pointer;transition:background .2s;margin-top:.5rem}
.btn-apply:hover{background:var(--gold)}
.btn-reset{width:100%;background:transparent;border:1px solid var(--border2);color:var(--mist);padding:.55rem;font-family:'DM Sans',sans-serif;font-size:.76rem;cursor:pointer;transition:all .2s;margin-top:.4rem}
.btn-reset:hover{color:var(--white)}

/* ── CARDS ── */
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1px;background:var(--border);border:1px solid var(--border)}
.results-grid.list-view{grid-template-columns:1fr;background:none;border:none;gap:.5rem}
.rc{background:var(--card);cursor:pointer;transition:background .2s;position:relative;overflow:hidden}
.rc:hover{background:var(--card2)}
.rc:hover .rc-plane{transform:scale(1.1) translateX(4px)}
.rc-img{aspect-ratio:16/9;background:linear-gradient(135deg,var(--surface),rgba(13,40,71,.7));display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.rc-img::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(5,8,15,.85))}
.rc-plane{font-size:4rem;opacity:.14;transition:transform .4s ease;filter:blur(.5px)}
.rc-fav{position:absolute;top:.6rem;right:.6rem;background:rgba(5,8,15,.65);border:1px solid var(--border2);color:var(--mist);width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:.85rem;cursor:pointer;transition:all .2s;z-index:2}
.rc-fav:hover,.rc-fav.liked{color:#ef4444;border-color:rgba(239,68,68,.4)}
.rc-body{padding:.9rem 1rem 1rem}
.rc-cat{font-size:.58rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:.35rem}
.rc-title{font-size:.92rem;font-weight:600;color:var(--white);margin-bottom:.5rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.rc-specs{display:flex;gap:.65rem;margin-bottom:.6rem;flex-wrap:wrap}
.rc-spec{font-size:.68rem;color:var(--mist)}
.rc-trust{font-size:.6rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--green);margin-bottom:.8rem;display:flex;align-items:center;gap:.3rem}
.rc-trust::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green)}
.rc-ft{display:flex;align-items:flex-end;justify-content:space-between;border-top:1px solid var(--border);padding-top:.7rem}
.rc-price{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.04em;color:var(--accent);line-height:1}
.rc-loc{font-size:.66rem;color:var(--mist);text-align:right}
.results-grid.list-view .rc{border:1px solid var(--border);display:flex;flex-direction:row}
.results-grid.list-view .rc-img{aspect-ratio:unset;width:160px;flex-shrink:0}
.results-grid.list-view .rc-body{flex:1;display:flex;flex-direction:column;justify-content:space-between}
.results-grid.list-view .rc-title{white-space:normal}

/* Empty */
.empty-results{grid-column:1/-1;padding:4rem 2rem;text-align:center;background:var(--card);border:1px solid var(--border)}
.er-icon{font-size:2.5rem;opacity:.1;margin-bottom:1rem}
.er-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.06em;margin-bottom:.5rem}
.er-sub{font-size:.8rem;color:var(--mist);line-height:1.6}
.er-sub a{color:var(--accent);text-decoration:none}

/* ── PAGINATION ── */
.pagination{display:flex;gap:4px;justify-content:center;margin-top:2rem;padding-bottom:3rem}
.pgbtn{background:rgba(255,255,255,.04);border:1px solid var(--border2);color:var(--mist);width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.8rem;font-family:'DM Sans',sans-serif;transition:all .15s}
.pgbtn:hover{color:var(--white)}
.pgbtn.active{background:var(--accent);border-color:var(--accent);color:var(--deep);font-weight:600}
.pgbtn-prev,.pgbtn-next{width:auto;padding:0 .9rem;font-size:.72rem;font-weight:500;white-space:nowrap}

.chk-row{display:flex;align-items:center;gap:.55rem;font-size:.78rem;color:var(--mist);cursor:pointer}
.chk-row input{accent-color:var(--accent);width:14px;height:14px;flex-shrink:0;cursor:pointer}
.chk-row:hover span{color:var(--white)}

/* Mobile filter btn */
.mob-filter-btn{display:none;width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border2);color:var(--dim);padding:.65rem 1rem;font-family:'DM Sans',sans-serif;font-size:.8rem;cursor:pointer;margin-bottom:1rem;align-items:center;gap:.5rem}

/* Skeleton */
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
.skel{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.6s infinite}

/* Toast */
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--card2);border:1px solid var(--border2);color:var(--white);padding:.75rem 1.3rem;font-size:.8rem;font-weight:500;z-index:999;opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* ── RESPONSIVE ── */
@media(max-width:1024px){.search-layout{grid-template-columns:1fr;padding:1rem}.sidebar{position:static;display:none}.sidebar.open{display:block}.mob-filter-btn{display:flex}}
@media(max-width:768px){nav{padding:0 1.25rem}.nav-links,.btn-nav-login,.nav-center{display:none}.burger{display:flex}.search-header{padding:.75rem 1rem}.results-grid{grid-template-columns:1fr}.results-grid.list-view .rc{flex-direction:column}.results-grid.list-view .rc-img{width:100%;aspect-ratio:16/9}}
@media(max-width:480px){
  a,button{min-height:44px;display:inline-flex;align-items:center;justify-content:center}input,select,button{font-size:16px !important}}

.nav-currency{position:relative;display:flex;align-items:center;height:64px}
.nav-currency-btn{display:flex;align-items:center;gap:.4rem;height:64px;padding:0 .9rem;font-size:.72rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--mist);cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;transition:color .2s;white-space:nowrap}
.nav-currency-btn:hover{color:var(--white)}
.nav-currency-btn .cv-icon{font-size:.82rem;font-weight:700;color:var(--accent);min-width:10px}
.nav-currency-btn .cv-arrow{font-size:.55rem;opacity:.5;transition:transform .2s}
.nav-currency.open .cv-arrow{transform:rotate(180deg)}
.nav-currency.open .nav-currency-btn{color:var(--white)}
.cv-dropdown{position:absolute;top:calc(100% + 1px);left:50%;transform:translateX(-50%) translateY(-6px);width:284px;background:rgba(3,6,16,.98);backdrop-filter:blur(28px);border:1px solid var(--border2);z-index:500;opacity:0;pointer-events:none;transition:opacity .18s,transform .18s}
.nav-currency.open .cv-dropdown{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
.cv-drop-head{padding:.6rem 1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.cv-drop-title{font-size:.58rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--mist2)}
.cv-live{display:flex;align-items:center;gap:.35rem;font-size:.58rem;color:var(--green)}
.cv-live::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);animation:cvpulse 2s infinite;flex-shrink:0}
@keyframes cvpulse{0%,100%{opacity:1}50%{opacity:.3}}
.cv-body{padding:.85rem 1rem}
.cv-row{display:flex;gap:.4rem;margin-bottom:.4rem;align-items:center}
.cv-inp-wrap{flex:1;display:flex;border:1px solid var(--border2);overflow:hidden;min-width:0}
.cv-inp{flex:1;background:rgba(255,255,255,.04);border:none;color:var(--white);font-family:'DM Sans',sans-serif;font-size:.92rem;padding:.55rem .7rem;outline:none;min-width:0}
.cv-sel{background:rgba(232,160,32,.08);border:none;border-left:1px solid var(--border2);color:var(--accent);font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:600;padding:.3rem .4rem;cursor:pointer;outline:none;flex-shrink:0}
.cv-sel option{background:var(--deep);color:var(--white)}
.cv-swap-btn{background:none;border:1px solid var(--border2);color:var(--mist);width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.95rem;transition:all .15s;flex-shrink:0}
.cv-swap-btn:hover{color:var(--accent);border-color:rgba(232,160,32,.3)}
.cv-result-box{background:rgba(232,160,32,.06);border:1px solid rgba(232,160,32,.15);padding:.55rem .85rem;display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem}
.cv-result-val{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.04em;color:var(--accent)}
.cv-to-sel{background:none;border:none;color:var(--accent);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:700;cursor:pointer;outline:none;padding:0}
.cv-to-sel option{background:var(--deep);color:var(--white)}
.cv-rate-txt{font-size:.61rem;color:var(--mist2);text-align:center;padding:.2rem 0;border-top:1px solid var(--border)}
.cv-rate-txt span{color:var(--mist)}
.cv-quick{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-top:.45rem}
.cv-qb{background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--mist);padding:.27rem .2rem;font-size:.61rem;font-weight:600;cursor:pointer;text-align:center;letter-spacing:.04em;transition:all .12s;font-family:'DM Sans',sans-serif}
.cv-qb:hover,.cv-qb.on{border-color:rgba(232,160,32,.3);color:var(--accent);background:rgba(232,160,32,.05)}

/* ── BADGES ÉQUIPEMENTS ── */
.badge-ifr,.badge-rvsm,.badge-adsb{position:absolute;bottom:.5rem;font-size:.52rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.18rem .5rem;z-index:2;color:#fff}
.badge-ifr{left:.5rem;background:rgba(59,130,246,.9)}
.badge-rvsm{background:rgba(139,92,246,.9)}
.badge-adsb{background:rgba(16,185,129,.9)}
</style>

</head>
<body>


<!-- SEARCH HEADER -->
<div class="search-header">
  <div class="sh-inner">
    <div class="sh-title">Résultats</div>
    <div class="sh-count" id="resultCount">Chargement…</div>
    <select class="sort-select" id="sortSel" onchange="applyFilters()">
      <option value="recent">Plus récentes</option>
      <option value="price_asc">Prix croissant</option>
      <option value="price_desc">Prix décroissant</option>
      <option value="year_desc">Année (récent d'abord)</option>
      <option value="hours_asc">Heures (moins d'abord)</option>
    </select>
    <span style="font-size:.62rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--mist2)">Devise ↓</span>
    <select id="displayCurrency" onchange="onDisplayCurrencyChange()" style="background:var(--card2);border:1px solid var(--border2);color:var(--mist);font-family:'DM Sans',sans-serif;font-size:.72rem;padding:.38rem .6rem;cursor:pointer;outline:none;height:32px">
      <option value="EUR">€ EUR</option>
      <option value="USD">$ USD</option>
      <option value="GBP">£ GBP</option>
      <option value="CHF">Fr CHF</option>
      <option value="CAD">CA$ CAD</option>
      <option value="AUD">AU$ AUD</option>
    </select>
    <div class="view-btns">
      <button class="vbtn active" id="gridBtn" onclick="setView('grid')" title="Grille">⊞</button>
      <button class="vbtn" id="listBtn" onclick="setView('list')" title="Liste">☰</button>
    </div>
  </div>
</div>

<!-- LAYOUT -->
<div class="search-layout">

  <!-- SIDEBAR -->
  <div>
    <button class="mob-filter-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">⚙ Filtres</button>
    <div class="sidebar" id="sidebar">
      <div class="filter-group">
        <div class="fg-title">Catégorie</div>
        <div class="filter-cats">
          <div class="fcat active" data-cat="" onclick="setCat(this,'')"><div class="fcat-left"><span class="fcat-dot"></span>Toutes</div><span class="fcat-count" id="cnt-all">0</span></div>
          <div class="fcat" data-cat="light" onclick="setCat(this,'light')"><div class="fcat-left"><span class="fcat-dot"></span>Avions légers</div><span class="fcat-count" id="cnt-light">0</span></div>
          <div class="fcat" data-cat="jet" onclick="setCat(this,'jet')"><div class="fcat-left"><span class="fcat-dot"></span>Jets d'affaires</div><span class="fcat-count" id="cnt-jet">0</span></div>
          <div class="fcat" data-cat="turbo" onclick="setCat(this,'turbo')"><div class="fcat-left"><span class="fcat-dot"></span>Turbopropulseurs</div><span class="fcat-count" id="cnt-turbo">0</span></div>
          <div class="fcat" data-cat="heli" onclick="setCat(this,'heli')"><div class="fcat-left"><span class="fcat-dot"></span>Hélicoptères</div><span class="fcat-count" id="cnt-heli">0</span></div>
          <div class="fcat" data-cat="ulm" onclick="setCat(this,'ulm')"><div class="fcat-left"><span class="fcat-dot"></span>ULM</div><span class="fcat-count" id="cnt-ulm">0</span></div>
          <div class="fcat" data-cat="airliner" onclick="setCat(this,'airliner')"><div class="fcat-left"><span class="fcat-dot"></span>Avions de ligne</div><span class="fcat-count" id="cnt-airliner">0</span></div>
        </div>
      </div>
      <div class="filter-group">
        <div class="fg-title">Budget
          <select id="budgetCurrency" onchange="onBudgetCurrencyChange()" style="float:right;background:rgba(232,160,32,.1);border:1px solid rgba(232,160,32,.25);color:var(--accent);font-family:'DM Sans',sans-serif;font-size:.65rem;font-weight:700;padding:.18rem .35rem;cursor:pointer;outline:none">
            <option value="EUR">€ EUR</option>
            <option value="USD">$ USD</option>
            <option value="GBP">£ GBP</option>
            <option value="CHF">Fr CHF</option>
            <option value="CAD">CA$ CAD</option>
            <option value="AUD">AU$ AUD</option>
          </select>
        </div>
        <div class="range-row">
          <input type="number" class="range-inp" id="minPrice" placeholder="Min" onchange="applyFilters()">
          <span class="range-sep">—</span>
          <input type="number" class="range-inp" id="maxPrice" placeholder="Max" onchange="applyFilters()">
        </div>
        <div id="budgetRateNote" style="font-size:.62rem;color:var(--mist2);margin-top:.35rem;line-height:1.5"></div>
      </div>
      <div class="filter-group">
        <div class="fg-title">Année de construction</div>
        <div class="range-row">
          <input type="number" class="range-inp" id="minYear" placeholder="Depuis" min="1940" max="2026" onchange="applyFilters()">
          <span class="range-sep">—</span>
          <input type="number" class="range-inp" id="maxYear" placeholder="Jusqu'à" min="1940" max="2026" onchange="applyFilters()">
        </div>
      </div>
      <div class="filter-group">
        <div class="fg-title">Heures totales (TT)</div>
        <div class="range-row">
          <input type="number" class="range-inp" id="minHours" placeholder="Min" onchange="applyFilters()">
          <span class="range-sep">—</span>
          <input type="number" class="range-inp" id="maxHours" placeholder="Max" onchange="applyFilters()">
        </div>
      </div>
      <div class="filter-group">
        <div class="fg-title">SMOH — Heures moteur depuis révision</div>
        <div class="range-row">
          <input type="number" class="range-inp" id="minSmoh" placeholder="Min" onchange="applyFilters()">
          <span class="range-sep">—</span>
          <input type="number" class="range-inp" id="maxSmoh" placeholder="Max" onchange="applyFilters()">
        </div>
      </div>
      <div class="filter-group">
        <div class="fg-title">Pays</div>
        <select class="range-inp" id="filterCountry" style="width:100%" onchange="applyFilters()">
          <option value="">Tous les pays</option>
          <option value="France">France</option>
          <option value="Allemagne">Allemagne</option>
          <option value="Royaume-Uni">Royaume-Uni</option>
          <option value="Espagne">Espagne</option>
          <option value="Italie">Italie</option>
          <option value="Suisse">Suisse</option>
          <option value="Belgique">Belgique</option>
          <option value="Pays-Bas">Pays-Bas</option>
          <option value="Portugal">Portugal</option>
          <option value="USA">USA</option>
          <option value="Canada">Canada</option>
          <option value="Australie">Australie</option>
        </select>
      </div>
      <div class="filter-group">
        <div class="fg-title">Équipements</div>
        <div style="display:flex;flex-direction:column;gap:.5rem">
          <label class="chk-row"><input type="checkbox" id="fIFR" onchange="applyFilters()"><span>IFR certifié</span></label>
          <label class="chk-row"><input type="checkbox" id="fRVSM" onchange="applyFilters()"><span>RVSM approuvé</span></label>
          <label class="chk-row"><input type="checkbox" id="fADSB" onchange="applyFilters()"><span>ADS-B équipé</span></label>
        </div>
      </div>
      <button class="btn-apply" onclick="applyFilters()">Appliquer les filtres</button>
      <button class="btn-reset" onclick="resetFilters()">Réinitialiser</button>
