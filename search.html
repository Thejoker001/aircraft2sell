<!DOCTYPE html>
<html lang="en">
<head>

<title>Aircraft2Sell — Search Results</title>

<style>nav{position:sticky;top:0;z-index:200;background:rgba(6,11,21,.95);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);height:64px;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.1em;color:var(--white);text-decoration:none;display:flex;align-items:center;gap:.5rem;flex-shrink:0}

.nav-links{display:flex;gap:1.5rem;list-style:none;font-size:.82rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase}
.nav-links a{color:var(--mist);text-decoration:none;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--accent)}
.nav-right{display:flex;align-items:center;gap:.7rem;flex-shrink:0}
.lang-sw{display:flex;align-items:center;gap:2px;background:rgba(255,255,255,.04);border:1px solid var(--border);padding:3px}
.lb{background:none;border:none;color:var(--mist);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:600;padding:.28rem .45rem;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:3px;white-space:nowrap}
.lb:hover{color:var(--white)}
.lb.active{background:var(--accent);color:var(--deep)}
.lf{font-size:.9rem}
.lb-lbl{font-size:.7rem}
.btn-login{background:transparent;color:var(--mist);border:1px solid var(--border);padding:.5rem 1.1rem;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;letter-spacing:.06em;cursor:pointer;transition:all .2s;text-transform:uppercase;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;gap:.4rem}
.btn-login:hover{border-color:var(--accent);color:var(--accent)}
.login-icon{font-size:.9rem}
.btn-post{background:var(--accent);color:var(--white);border:none;padding:.5rem 1.1rem;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;letter-spacing:.06em;cursor:pointer;transition:background .2s,transform .15s;text-transform:uppercase;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center}
.btn-post:hover{background:var(--gold);transform:translateY(-1px)}
:root{--sky:#0a0f1e;--deep:#060b15;--horizon:#0d2847;--accent:#e8a020;--gold:#f5c842;--mist:#8fa3b8;--mist2:#5a7490;--white:#f0f4f8;--card:#0e1a2e;--card2:#111f35;--border:rgba(200,212,224,0.12);--green:#22c55e;--red:#ef4444}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--sky);color:var(--white);min-height:100vh}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(1px 1px at 10% 15%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 80% 60%,rgba(255,255,255,.3) 0%,transparent 100%)}50%{transform:rotate(-10deg) translateY(-3px)}}
/* SEARCH BAR TOP */
.search-top{position:relative;z-index:1;background:var(--horizon);border-bottom:1px solid var(--border);padding:1rem 2rem}
.search-row{display:flex;gap:0;max-width:1300px;margin:0 auto;overflow:hidden;border:1px solid var(--border)}
.sf{flex:1;min-width:120px;padding:.85rem 1rem;border:none;border-right:1px solid var(--border);background:var(--card);color:var(--white);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none}
.sf::placeholder{color:var(--mist2)}
select.sf option{background:var(--card)}
.sbtn{background:var(--accent);color:var(--deep);border:none;padding:.85rem 1.8rem;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.1em;cursor:pointer;white-space:nowrap;transition:background .2s}
.sbtn:hover{background:var(--gold)}
/* LAYOUT */
.results-wrap{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:1.5rem 2rem;display:grid;grid-template-columns:260px 1fr;gap:1.5rem;align-items:start}
@media(max-width:800px){.results-wrap{grid-template-columns:1fr}.filters-sidebar{display:none}}
/* FILTERS SIDEBAR */
.filters-sidebar{position:sticky;top:70px}
.filter-box{background:var(--card);border:1px solid var(--border);margin-bottom:1.5px;overflow:hidden}
.filter-header{padding:.9rem 1.1rem;font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:.1em;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.filter-arrow{color:var(--mist);transition:transform .2s;font-size:.8rem}
.filter-body{padding:.9rem 1.1rem}
.filter-option{display:flex;align-items:center;gap:.6rem;padding:.35rem 0;font-size:.82rem;color:var(--mist);cursor:pointer;transition:color .2s}
.filter-option:hover{color:var(--white)}
.filter-option input[type=checkbox]{accent-color:var(--accent)}
.filter-option input[type=radio]{accent-color:var(--accent)}
.range-wrap{display:flex;gap:.5rem;align-items:center}
.range-input{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--white);padding:.5rem .7rem;font-family:'DM Sans',sans-serif;font-size:.82rem;outline:none;width:100%}
.range-input:focus{border-color:var(--accent)}
.range-sep{color:var(--mist);font-size:.75rem;flex-shrink:0}
.filter-apply{width:100%;background:var(--accent);color:var(--deep);border:none;padding:.65rem;font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:.1em;cursor:pointer;margin-top:1rem;transition:background .2s}
.filter-apply:hover{background:var(--gold)}
.filter-reset{width:100%;background:transparent;color:var(--mist);border:1px solid var(--border);padding:.55rem;font-family:'DM Sans',sans-serif;font-size:.78rem;cursor:pointer;margin-top:.4rem;transition:all .2s}
.filter-reset:hover{border-color:var(--accent);color:var(--accent)}
/* RESULTS HEADER */
.results-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:.8rem}
.results-count{font-size:.85rem;color:var(--mist)}
.results-count strong{color:var(--white)}
.sort-controls{display:flex;align-items:center;gap:.6rem}
.sort-select{background:var(--card);border:1px solid var(--border);color:var(--mist);padding:.4rem .8rem;font-family:'DM Sans',sans-serif;font-size:.78rem;outline:none;cursor:pointer}
.view-toggle{display:flex;gap:2px}
.vt-btn{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--mist);padding:.4rem .6rem;cursor:pointer;font-size:.85rem;transition:all .2s}
.vt-btn.active{background:var(--accent);color:var(--deep);border-color:var(--accent)}
/* ACTIVE FILTERS */
.active-filters{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem}
.af-tag{background:rgba(232,160,32,.1);border:1px solid rgba(232,160,32,.3);color:var(--accent);font-size:.72rem;padding:.25rem .6rem;display:flex;align-items:center;gap:.4rem}
.af-remove{cursor:pointer;opacity:.7}.af-remove:hover{opacity:1}
/* CARDS GRID */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1px;background:var(--border);border:1px solid var(--border)}
.cards-grid.list-view{grid-template-columns:1fr}
.result-card{background:var(--card);display:flex;flex-direction:column;cursor:pointer;transition:transform .25s,box-shadow .25s;overflow:hidden}
.result-card:hover{transform:translateY(-4px);box-shadow:0 20px 50px rgba(0,0,0,.5);z-index:2}
.cards-grid.list-view .result-card{flex-direction:row}
.rc-img{height:180px;background:linear-gradient(135deg,#0d2847,#1a3a5c);display:flex;align-items:center;justify-content:center;font-size:4rem;color:rgba(255,255,255,.15);flex-shrink:0;position:relative}
.cards-grid.list-view .rc-img{width:200px;height:auto}
.rc-badge{position:absolute;top:.7rem;left:.7rem;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;padding:.2rem .55rem}
.b-new{background:var(--accent);color:var(--deep)}.b-urgent{background:#e84040;color:#fff}.b-premium{background:linear-gradient(90deg,#b8860b,#f5c842);color:var(--deep)}
.fav-mini{position:absolute;top:.6rem;right:.6rem;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.12);color:var(--mist);width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.85rem;transition:all .2s}
.fav-mini:hover,.fav-mini.liked{color:#ef4444;border-color:#ef4444}
.rc-body{padding:1.1rem;flex:1;display:flex;flex-direction:column;gap:.6rem}
.rc-cat{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);font-weight:600}
.rc-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.04em;color:var(--white);line-height:1.05}
.rc-specs{display:flex;gap:.8rem;flex-wrap:wrap}
.rc-spec{font-size:.74rem;color:var(--mist)}
.rc-ft{display:flex;justify-content:space-between;align-items:flex-end;margin-top:auto;padding-top:.7rem;border-top:1px solid var(--border)}
.rc-price{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--gold)}
.rc-loc{font-size:.72rem;color:var(--mist)}
.rc-trust{display:flex;align-items:center;gap:.3rem;font-size:.62rem;color:var(--green)}
/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:center;gap:.3rem;margin-top:2rem;flex-wrap:wrap}
.pg-btn{background:var(--card);border:1px solid var(--border);color:var(--mist);padding:.45rem .75rem;font-size:.82rem;cursor:pointer;transition:all .2s;min-width:36px;text-align:center}
.pg-btn:hover{border-color:var(--accent);color:var(--accent)}
.pg-btn.active{background:var(--accent);color:var(--deep);border-color:var(--accent)}
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--card);border:1px solid var(--accent);padding:.9rem 1.4rem;color:var(--white);font-size:.86rem;z-index:999;opacity:0;transform:translateY(20px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}</style>
</head>

};
let lang='en', viewMode='grid', currentPage=1;
const PER_PAGE=9;
function t(k){return(T[lang]&&T[lang][k])||(T.en[k])||k}
const MOCK=[];

function renderCards(){
  const g=document.getElementById('resultsGrid');
  if(!g) return;
  if(!LISTINGS||LISTINGS.length===0){
    g.style.background='transparent';g.style.border='none';
    g.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:3rem 2rem;color:var(--mist)"><div style="font-size:3rem;opacity:.2;margin-bottom:1rem">🔍</div><div style="font-family:Bebas Neue,sans-serif;font-size:1.2rem;letter-spacing:.06em;color:var(--white);margin-bottom:.5rem">No listings match your search</div><p style="font-size:.82rem;line-height:1.6;max-width:280px;margin:0 auto">Try adjusting your filters or be the first to <a href="post-listing.html" style="color:var(--accent)">post a listing</a>.</p></div>';
    document.getElementById('resultCount').textContent='0 listings found';
    return;
  }

  const grid=document.getElementById('cardsGrid');
  grid.className='cards-grid'+(viewMode==='list'?' list-view':'');
  const start=(currentPage-1)*PER_PAGE, end=Math.min(start+PER_PAGE,MOCK.length);
  grid.innerHTML=MOCK.slice(start,end).map(c=>`
    <div class="result-card" onclick="window.location.href='listing.html'">
      <div class="rc-img">
        <span style="font-size:3.5rem;opacity:.15">${c.icon}</span>
        ${c.badge?`<span class="rc-badge ${c.badge}">${t(c.badgeKey)}</span>`:''}
        <button class="fav-mini" onclick="event.stopPropagation();this.classList.toggle('liked');this.textContent=this.classList.contains('liked')?'♥':'♡';showToast(t('toast_fav'))">♡</button>
      </div>
      <div class="rc-body">
        <div class="rc-cat">${c.cat}</div>
        <div class="rc-title">${c.title}</div>
        <div class="rc-specs">
          <span class="rc-spec">📅 ${c.year}</span>
          <span class="rc-spec">⏱ ${c.hours}</span>
        </div>
        <div class="rc-trust">✓ Verified</div>
        <div class="rc-ft">
          <div class="rc-price">${c.price}</div>
          <div class="rc-loc">📍 ${c.loc}</div>
        </div>
      </div>
    </div>`).join('');
  renderPagination();
}
function renderPagination(){
  const total=Math.ceil(MOCK.length/PER_PAGE);
  let html='';
  if(currentPage>1) html+=`<button class="pg-btn" onclick="goPage(${currentPage-1})">${t('prev_page')}</button>`;
  for(let i=1;i<=total;i++) html+=`<button class="pg-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  if(currentPage<total) html+=`<button class="pg-btn" onclick="goPage(${currentPage+1})">${t('next_page')}</button>`;
  document.getElementById('pagination').innerHTML=html;
}
function goPage(p){currentPage=p;renderCards();window.scrollTo({top:200,behavior:'smooth'});}
function setView(v){viewMode=v;document.getElementById('gridBtn').classList.toggle('active',v==='grid');document.getElementById('listBtn').classList.toggle('active',v==='list');renderCards();}
function toggleFilter(header){header.querySelector('.filter-arrow').style.transform=header.querySelector('.filter-arrow').style.transform==='rotate(180deg)'?'':'rotate(180deg)';}
function removeFilter(el){el.parentElement.remove();}
function doSearch(){showToast(t('toast_filter'));}
function setLang(l){
  lang=l;
  document.querySelectorAll('.lb').forEach(b=>{b.classList.toggle('active',b.textContent.trim()===(l==='zh'?'中文':l.toUpperCase()));});
  document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=t(el.getAttribute('data-i18n'));});
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>{el.placeholder=t(el.getAttribute('data-i18n-placeholder'));});
  renderCards();
}
let tt2;function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(tt2);tt2=setTimeout(()=>el.classList.remove('show'),3000);}
renderCards();setLang('en');
</script>
