<style>nav{position:sticky;top:0;z-index:200;background:rgba(6,11,21,.95);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);height:64px;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.nav-links{display:flex;list-style:none;margin:0;padding:0;gap:1.5rem;align-items:center;height:64px;font-size:.82rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase}.nav-links li{display:flex;align-items:center;height:64px}.nav-links a{color:var(--mist);text-decoration:none;transition:color .2s;display:flex;align-items:center;height:64px;white-space:nowrap}.nav-links a:hover,.nav-links a.active{color:var(--accent)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.1em;color:var(--white);text-decoration:none;display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.logo span{color:var(--accent)}
@keyframes flt{0%,100%{transform:rotate(-10deg) translateY(0)}50%{transform:rotate(-10deg) translateY(-4px)}}




.nav-right{display:flex;align-items:center;gap:.7rem;flex-shrink:0}
.lang-sw{display:flex;align-items:center;gap:2px;background:rgba(255,255,255,.04);border:1px solid var(--border);padding:3px}
.lb{background:none;border:none;color:var(--mist);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:600;padding:.28rem .45rem;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:3px;white-space:nowrap}
.lb:hover{color:var(--white)}
.lb.active{background:var(--accent);color:var(--deep)}
.lf{font-size:.9rem}
.lb-lbl{font-size:.7rem}
.btn-login{background:transparent;color:var(--mist);border:1px solid var(--border);padding:.5rem 1.1rem;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;letter-spacing:.06em;cursor:pointer;transition:all .2s;text-transform:uppercase;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;gap:.4rem}
.btn-login:hover{border-color:var(--accent);color:var(--accent)}
.login-icon{font-size:.9rem}
.btn-post{background:var(--accent);color:var(--white);border:none;padding:.5rem 1.1rem;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;letter-spacing:.06em;cursor:pointer;transition:background .2s,transform .15s;text-transform:uppercase;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center}
.btn-post:hover{background:var(--gold);transform:translateY(-1px)}
:root{--sky:#0a0f1e;--deep:#060b15;--accent:#e8a020;--gold:#f5c842;--mist:#8fa3b8;--white:#f0f4f8;--card:#0e1a2e;--border:rgba(200,212,224,0.12)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--sky);color:var(--white);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;overflow:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(1px 1px at 15% 25%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1px 1px at 70% 60%,rgba(255,255,255,.3) 0%,transparent 100%),radial-gradient(2px 2px at 40% 80%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 85% 20%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(2px 2px at 55% 15%,rgba(255,255,255,.6) 0%,transparent 100%)}50%{transform:rotate(-10deg) translateY(-3px)}}

.wrap{position:relative;z-index:1;max-width:560px;padding-top:3rem}

/* Giant animated 404 */
.num-404{font-family:'Bebas Neue',sans-serif;font-size:clamp(8rem,20vw,14rem);letter-spacing:-.02em;line-height:1;color:transparent;-webkit-text-stroke:2px rgba(232,160,32,.3);position:relative;animation:fadeIn .6s .1s both}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.num-404::after{content:'404';position:absolute;inset:0;color:rgba(232,160,32,.08);filter:blur(20px);-webkit-text-stroke:0}

/* Plane animation */
.plane-404{font-size:3.5rem;display:block;animation:flyby 8s linear infinite;position:relative;margin:-.5rem auto;filter:drop-shadow(0 0 12px rgba(232,160,32,.4))}
@keyframes flyby{0%{transform:translateX(-120px) rotate(-5deg);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateX(calc(100vw + 120px)) rotate(-5deg);opacity:0}}

.title-404{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.8rem,4vw,2.8rem);letter-spacing:.05em;color:var(--white);margin-bottom:.8rem;animation:fadeIn .6s .3s both}
.sub-404{color:var(--mist);font-size:.95rem;font-weight:300;line-height:1.7;margin-bottom:2.5rem;animation:fadeIn .6s .4s both}

.suggestions{background:var(--card);border:1px solid var(--border);padding:1.5rem;text-align:left;margin-bottom:2rem;animation:fadeIn .6s .5s both}
.sug-title{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:.8rem}
.sug-list{list-style:none;display:flex;flex-direction:column;gap:.5rem}
.sug-item{display:flex;align-items:center;gap:.6rem;font-size:.84rem;color:var(--mist);transition:color .2s;text-decoration:none;cursor:pointer}
.sug-item:hover{color:var(--white)}
.sug-icon{font-size:.9rem;flex-shrink:0}

.btn-row{display:flex;gap:1rem;animation:fadeIn .6s .6s both;flex-wrap:wrap;justify-content:center}
.btn-home{background:var(--accent);color:var(--deep);border:none;padding:.85rem 2rem;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.1em;cursor:pointer;transition:background .2s;text-decoration:none;display:inline-block}
.btn-home:hover{background:var(--gold)}
.btn-back{background:transparent;color:var(--mist);border:1px solid var(--border);padding:.85rem 2rem;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.1em;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block}
.btn-back:hover{border-color:var(--accent);color:var(--accent)}
.nav-user{display:flex;align-items:center;gap:.5rem;cursor:default}
.nav-avatar{width:32px;height:32px;border-radius:50%;background:rgba(232,160,32,.15);border:1.5px solid rgba(232,160,32,.4);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.76rem;color:var(--accent);flex-shrink:0;text-transform:uppercase}
.nav-user-info{display:flex;flex-direction:column;line-height:1.2}
.nav-user-name{font-size:.78rem;font-weight:500;color:var(--white)}
.nav-user-plan{font-size:.58rem;color:var(--accent);letter-spacing:.06em;text-transform:uppercase}
</style>
<link rel="stylesheet" href="mobile.css">
</head>
<body>
<nav>
  <a href="homepage.html" class="logo"><svg viewBox="0 0 64 64" style="width:1.4em;height:1.4em;display:inline-block;vertical-align:middle;fill:var(--accent);flex-shrink:0;animation:flt 4s ease-in-out infinite" xmlns="http://www.w3.org/2000/svg"><path d="M60 22c0-2-2-4-5-4l-12 1-16-14H18l8 14-14 1-5-6H2l3 10-3 10h5l5-6 14 1-8 14h9l16-14 12 1c3 0 5-2 5-4v-3z"/></svg>Aircraft2<span>Sell</span></a>

    <li><a href="homepage.html" data-i18n="nav_listings">Annonces</a></li>

    <li><a href="contact.html">Contact</a></li>
  </ul>
  <div class="nav-right">
    
        <div class="nav-user" id="navUser" style="display:none">
      <div class="nav-avatar" id="navAvatar">U</div>
      <div class="nav-user-info">
        <div class="nav-user-name" id="navUserName">Mon compte</div>
        <div class="nav-user-plan" id="navUserPlan">Essentiel</div>
      </div>
    </div>
    <a href="login.html" class="btn-login" id="btnLogin"><span class="login-icon">👤</span><span id="btnLoginTxt">Connexion</span></a>
    <a href="#" class="btn-post" id="btnPost" onclick="a2sAuth.requireLogin(event,'post-listing.html')">Déposer une annonce</a>
    
  </div>

  <!-- Mobile burger -->
  <button class="burger" id="burgerBtn" onclick="toggleMobileMenu()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>
<div class="mobile-menu" id="mobileMenu">

<div class="wrap">
  <div class="num-404">404</div>
  <span class="plane-404">✈</span>
  <h1 class="title-404" id="title404">Page not found</h1>
  <p class="sub-404" id="sub404">The page you're looking for may have been removed, renamed, or is temporarily unavailable.</p>

  <div class="suggestions">
    <div class="sug-title" id="sugTitle">You might be looking for</div>
    <ul class="sug-list" id="sugList"></ul>
  </div>

  <div class="btn-row">
    <a href="homepage.html" class="btn-home" id="btnHome">Back to homepage</a>
    <a href="search.html" class="btn-back" id="btnSearch">Browse listings</a>
  </div>
</div>

<script>
function requireLogin(e, dest){
  e.preventDefault();
  const ok = localStorage.getItem('a2s_logged_in')==='true';
  window.location.href = ok ? dest : 'login.html?redirect='+encodeURIComponent(dest);
}

const T={
  en:{title:'Page not found',sub:"The page you're looking for may have been removed, renamed, or is temporarily unavailable.",sugTitle:'You might be looking for',btnHome:'Back to homepage',btnSearch:'Browse listings',
  suggestions:[{icon:'🏠',text:'Homepage',href:'homepage.html'},{icon:'✈',text:'All listings',href:'search.html'},{icon:'💰',text:'Pricing plans',href:'pricing.html'},{icon:'📝',text:'Post an ad',href:'post-listing.html'},{icon:'🔑',text:'Sign in',href:'login.html'}]},
  fr:{title:'Page introuvable',sub:"La page que vous recherchez a peut-être été supprimée, renommée ou est temporairement indisponible.",sugTitle:'Vous cherchez peut-être',btnHome:"Retour à l'accueil",btnSearch:'Parcourir les annonces',
  suggestions:[{icon:'🏠',text:'Accueil',href:'homepage.html'},{icon:'✈',text:'Toutes les annonces',href:'search.html'},{icon:'💰',text:'Tarifs',href:'pricing.html'},{icon:'📝',text:'Déposer une annonce',href:'post-listing.html'},{icon:'🔑',text:'Connexion',href:'login.html'}]},
  de:{title:'Seite nicht gefunden',sub:'Die gesuchte Seite wurde möglicherweise entfernt, umbenannt oder ist vorübergehend nicht verfügbar.',sugTitle:'Sie suchen vielleicht',btnHome:'Zurück zur Startseite',btnSearch:'Anzeigen durchsuchen',
  suggestions:[{icon:'🏠',text:'Startseite',href:'homepage.html'},{icon:'✈',text:'Alle Anzeigen',href:'search.html'},{icon:'💰',text:'Preise',href:'pricing.html'},{icon:'📝',text:'Inserat aufgeben',href:'post-listing.html'},{icon:'🔑',text:'Anmelden',href:'login.html'}]},
  es:{title:'Página no encontrada',sub:'La página que buscas puede haber sido eliminada, renombrada o no estar disponible temporalmente.',sugTitle:'Quizás buscas',btnHome:'Volver al inicio',btnSearch:'Ver anuncios',
  suggestions:[{icon:'🏠',text:'Inicio',href:'homepage.html'},{icon:'✈',text:'Todos los anuncios',href:'search.html'},{icon:'💰',text:'Tarifas',href:'pricing.html'},{icon:'📝',text:'Publicar anuncio',href:'post-listing.html'},{icon:'🔑',text:'Iniciar sesión',href:'login.html'}]},
  zh:{title:'页面未找到',sub:'您查找的页面可能已被删除、重命名或暂时不可用。',sugTitle:'您可能在寻找',btnHome:'返回首页',btnSearch:'浏览广告',
  suggestions:[{icon:'🏠',text:'首页',href:'homepage.html'},{icon:'✈',text:'全部广告',href:'search.html'},{icon:'💰',text:'定价方案',href:'pricing.html'},{icon:'📝',text:'发布广告',href:'post-listing.html'},{icon:'🔑',text:'登录',href:'login.html'}]}
};
let lang='en';
function t(k){return(T[lang]&&T[lang][k])||(T.en[k])||k}
function setLang(l){
  lang=l;
  document.querySelectorAll('.lb').forEach(b=>{b.classList.toggle('active',b.textContent.trim()===(l==='zh'?'中文':l.toUpperCase()));});
  document.getElementById('title404').textContent=t('title');
  document.getElementById('sub404').textContent=t('sub');
  document.getElementById('sugTitle').textContent=t('sugTitle');
  document.getElementById('btnHome').textContent=t('btnHome');
  document.getElementById('btnSearch').textContent=t('btnSearch');
  document.getElementById('sugList').innerHTML=t('suggestions').map(s=>`<li><a href="${s.href}" class="sug-item"><span class="sug-icon">${s.icon}</span>${s.text}</a></li>`).join('');
}
setLang('fr');
</script>
