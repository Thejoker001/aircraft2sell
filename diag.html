<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Aircraft2Sell — Diagnostic</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'DM Sans',system-ui,sans-serif}
body{background:#060b15;color:#f0f4f8;padding:1.5rem;line-height:1.6}
h1{font-family:'Bebas Neue',system-ui;font-size:1.8rem;letter-spacing:.1em;color:#e8a020;margin-bottom:1.5rem}
.card{background:#0c1826;border:1px solid rgba(200,220,240,.1);padding:1.2rem;margin-bottom:1rem}
.card-title{font-size:.62rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#8fa3b8;margin-bottom:.8rem}
.row{display:flex;align-items:center;justify-content:space-between;padding:.4rem 0;border-bottom:1px solid rgba(200,220,240,.06);font-size:.82rem}
.row:last-child{border-bottom:none}
.lbl{color:#4a6278}.val{font-weight:500}
.ok{color:#22c55e}.warn{color:#f97316}.err{color:#ef4444}
.btn{background:#e8a020;color:#060b15;border:none;padding:.6rem 1.2rem;font-weight:700;font-size:.8rem;cursor:pointer;margin:.3rem .3rem 0 0;transition:background .2s}
.btn:hover{background:#f5c842}
.btn.ghost{background:rgba(255,255,255,.06);color:#8fa3b8}
.btn.danger{background:rgba(239,68,68,.15);color:#ef4444}
.code{background:rgba(255,255,255,.05);padding:.8rem 1rem;font-size:.75rem;font-family:monospace;overflow-x:auto;white-space:pre-wrap;word-break:break-all;max-height:300px;overflow-y:auto;margin-top:.5rem}
.badge{font-size:.58rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.15rem .45rem;border-radius:3px}
.b-ok{background:rgba(34,197,94,.15);color:#22c55e}
.b-err{background:rgba(239,68,68,.15);color:#ef4444}
.b-warn{background:rgba(249,115,22,.15);color:#f97316}
hr{border:none;border-top:1px solid rgba(200,220,240,.08);margin:1rem 0}
/* Gate de sécurité */
#gate{position:fixed;inset:0;background:#030812;display:flex;align-items:center;justify-content:center;z-index:1000}
#gate.hidden{display:none}
.gate-box{background:#0c1826;border:1px solid rgba(200,220,240,.1);border-radius:12px;padding:2rem;width:320px;text-align:center}
.gate-title{font-size:1.1rem;font-weight:600;margin-bottom:.5rem;color:#e8a020}
.gate-sub{font-size:.75rem;color:#4a6278;margin-bottom:1.2rem}
.gate-input{width:100%;background:rgba(200,220,240,.04);border:1px solid rgba(200,220,240,.1);border-radius:6px;padding:.6rem .9rem;color:#f0f4f8;font-size:.85rem;margin-bottom:.75rem;outline:none}
.gate-btn{width:100%;background:#e8a020;color:#060b15;border:none;padding:.7rem;font-weight:700;border-radius:6px;cursor:pointer;font-size:.9rem}
.gate-err{color:#ef4444;font-size:.75rem;margin-top:.5rem}
</style>
</head>
<body>

<!-- GATE DE SÉCURITÉ -->
<div id="gate">
  <div class="gate-box">
    <div class="gate-title">🔒 Accès restreint</div>
    <div class="gate-sub">Diagnostic réservé aux administrateurs</div>
    <input type="password" id="gPw" class="gate-input" placeholder="Mot de passe admin" onkeydown="if(event.key==='Enter')checkGate()">
    <button class="gate-btn" onclick="checkGate()">Accéder</button>
    <div class="gate-err" id="gErr"></div>
  </div>
</div>

<!-- CONTENU DIAGNOSTIC (masqué jusqu'à auth) -->
<div id="diagContent" style="display:none">
<h1>🔧 Diagnostic Aircraft2Sell</h1>

<div class="card">
  <div class="card-title">0. Supabase</div>
  <div id="sb-status"><div class="row"><span class="lbl">Chargement...</span></div></div>
  <button class="btn" onclick="checkSB()" style="margin-top:.5rem">Tester Supabase</button>
</div>

<div class="card">
  <div class="card-title">1. État du localStorage</div>
  <div id="ls-status"></div>
</div>

<div class="card">
  <div class="card-title">2. Contenu a2s_listings</div>
  <div id="ls-listings"></div>
</div>

<div class="card">
  <div class="card-title">3. Contenu a2s_users</div>
  <div id="ls-users"></div>
</div>

<div class="card">
  <div class="card-title">4. Session</div>
  <div id="session-info"></div>
</div>

<div class="card">
  <div class="card-title">5. Actions de test</div>
  <button class="btn" onclick="injectListing()">+ Injecter annonce test (pending)</button>
  <button class="btn" onclick="injectUser()">+ Injecter membre test</button>
  <button class="btn ghost" onclick="refresh()">↺ Rafraîchir</button>
  <hr>
  <button class="btn danger" onclick="clearAll()">🗑 Tout effacer (reset)</button>
  <button class="btn danger" onclick="clearListings()">🗑 Effacer annonces</button>
  <button class="btn danger" onclick="clearUsers()">🗑 Effacer membres</button>
</div>

<div class="card">
  <div class="card-title">6. Test flux complet</div>
  <button class="btn" onclick="testFullFlow()">▶ Tester le flux complet</button>
  <div id="flow-result" style="margin-top:.8rem"></div>
</div>

<div class="card">
  <div class="card-title">7. Données brutes (localStorage)</div>
  <button class="btn ghost" onclick="showRaw()">Afficher JSON brut</button>
  <div id="raw-data"></div>
</div>
</div>

<script>
/* ── GATE DE SÉCURITÉ ── */
/* Le mot de passe doit être changé régulièrement et ne jamais être celui de l'admin principal */
var _DIAG_HASH = '5e8c9b5b3f2a1d4e6f7a8b9c0d1e2f3a'; // SHA256 du mot de passe à définir côté serveur
var _diagAuthed = false;
var _gAttempts  = 0;

/* Vérification via Supabase Auth (même mécanisme que l'admin) */
async function checkGate() {
  if (_gAttempts >= 5) {
    document.getElementById('gErr').textContent = 'Trop de tentatives. Rechargez la page.';
    return;
  }
  var pw = document.getElementById('gPw').value;
  if (!pw) return;

  /* Vérifier la session admin existante */
  var adminToken = sessionStorage.getItem('a2s_admin_session');
  if (adminToken) {
    try {
      var payload = JSON.parse(atob(adminToken.split('.')[1]));
      if (payload.exp * 1000 > Date.now()) {
        unlockDiag();
        return;
      }
    } catch(e) {}
  }

  /* Sinon auth Supabase */
  _gAttempts++;
  var adminEmails = ['contact.aircraft2sell@gmail.com'];
  var emailInput  = prompt('Email admin :');
  if (!emailInput || adminEmails.indexOf(emailInput.trim().toLowerCase()) === -1) {
    document.getElementById('gErr').textContent = 'Accès refusé.';
    document.getElementById('gPw').value = '';
    return;
  }

  try {
    var res = await fetch('https://hlivysnlzlqdjcigqgvk.supabase.co/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: { 'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhsaXZ5c25semxxZGpjaWdxZ3ZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjIwNzAsImV4cCI6MjA4OTc5ODA3MH0.5tKQLlx9LsSujgILJKpmo__ByHorH6KuLyznE-mBVwU', 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: emailInput.trim(), password: pw })
    });
    var data = await res.json();
    if (!res.ok || !data.access_token) throw new Error('Auth échouée');
    sessionStorage.setItem('a2s_admin_session', data.access_token);
    unlockDiag();
  } catch(e) {
    document.getElementById('gErr').textContent = 'Identifiants incorrects.';
    document.getElementById('gPw').value = '';
  }
}

function unlockDiag() {
  _diagAuthed = true;
  document.getElementById('gate').classList.add('hidden');
  document.getElementById('diagContent').style.display = 'block';
  refresh();
  checkSB();
}

/* Vérification auto si déjà connecté */
window.addEventListener('DOMContentLoaded', function() {
  var adminToken = sessionStorage.getItem('a2s_admin_session');
  if (adminToken) {
    try {
      var payload = JSON.parse(atob(adminToken.split('.')[1]));
      if (payload.exp * 1000 > Date.now()) { unlockDiag(); return; }
    } catch(e) {}
  }
});

/* ── SUPABASE ── */
var _SB = 'https://hlivysnlzlqdjcigqgvk.supabase.co';
var _SK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhsaXZ5c25semxxZGpjaWdxZ3ZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjIwNzAsImV4cCI6MjA4OTc5ODA3MH0.5tKQLlx9LsSujgILJKpmo__ByHorH6KuLyznE-mBVwU';

function getAuthHeaders() {
  var token = sessionStorage.getItem('a2s_admin_session') || _SK;
  return { 'apikey': _SK, 'Authorization': 'Bearer ' + token };
}

async function sbGet(t, p) {
  var r = await fetch(_SB + '/rest/v1/' + t + (p ? '?' + p : ''), { headers: getAuthHeaders() });
  return r.ok ? (await r.json()) : [];
}
async function sbPost(t, b) {
  return (await fetch(_SB + '/rest/v1/' + t, {
    method: 'POST',
    headers: Object.assign({ 'Content-Type': 'application/json', 'Prefer': 'return=minimal' }, getAuthHeaders()),
    body: JSON.stringify(b)
  })).ok;
}

/* ── ESCAPE HTML ── */
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── HELPERS ── */
function getLS(k){ try{ return JSON.parse(localStorage.getItem(k)||'[]'); }catch(e){ return []; } }
function setLS(k,v){ localStorage.setItem(k,JSON.stringify(v)); }
function badge(ok, textOk, textErr){
  return ok ? '<span class="badge b-ok">'+textOk+'</span>' : '<span class="badge b-err">'+textErr+'</span>';
}

function refresh(){
  if (!_diagAuthed) return;
  var listings = getLS('a2s_listings');
  var users    = getLS('a2s_users');
  var loggedIn = localStorage.getItem('a2s_logged_in') === 'true';
  var userName = esc(localStorage.getItem('a2s_user_name') || '—');
  var userEmail= esc(localStorage.getItem('a2s_user_email') || '—');
  var pending  = listings.filter(function(l){ return !l.status || l.status === 'pending'; });
  var live     = listings.filter(function(l){ return l.status === 'live'; });

  document.getElementById('ls-status').innerHTML =
    '<div class="row"><span class="lbl">localStorage disponible</span><span class="val">' + badge(typeof localStorage !== 'undefined', '✓ OK', '✗ Absent') + '</span></div>' +
    '<div class="row"><span class="lbl">a2s_listings</span><span class="val ' + (listings.length ? 'ok' : 'warn') + '">' + listings.length + ' ' + badge(listings.length > 0, 'données présentes', 'vide') + '</span></div>' +
    '<div class="row"><span class="lbl">└ En attente</span><span class="val ' + (pending.length ? 'ok' : 'warn') + '">' + pending.length + '</span></div>' +
    '<div class="row"><span class="lbl">└ Publiées</span><span class="val">' + live.length + '</span></div>' +
    '<div class="row"><span class="lbl">a2s_users</span><span class="val ' + (users.length ? 'ok' : 'warn') + '">' + users.length + ' ' + badge(users.length > 0, 'données présentes', 'vide') + '</span></div>' +
    '<div class="row"><span class="lbl">Utilisateur connecté</span><span class="val">' + badge(loggedIn, '✓ Oui', '✗ Non') + ' ' + userName + ' (' + userEmail + ')</span></div>';

  var llEl = document.getElementById('ls-listings');
  if (!listings.length) {
    llEl.innerHTML = '<div class="row"><span class="warn">Aucune annonce</span></div>';
  } else {
    llEl.innerHTML = listings.map(function(l, i){
      var sc = l.status === 'live' ? 'ok' : (l.status === 'rejected' ? 'err' : 'warn');
      return '<div class="row"><span class="lbl">#'+(i+1)+' — '+esc(l.make||'?')+' '+esc(l.model||'')+'</span><span class="val"><span class="'+sc+'">'+(l.status||'pending')+'</span></span></div>';
    }).join('');
  }

  var usEl = document.getElementById('ls-users');
  if (!users.length) {
    usEl.innerHTML = '<div class="row"><span class="warn">Aucun membre</span></div>';
  } else {
    usEl.innerHTML = users.map(function(u, i){
      return '<div class="row"><span class="lbl">#'+(i+1)+' — '+esc(u.name||'?')+' ('+esc(u.email)+')</span><span class="val">'+esc(u.plan||'Essentiel')+'</span></div>';
    }).join('');
  }

  var adminSess = sessionStorage.getItem('a2s_admin_session');
  document.getElementById('session-info').innerHTML =
    '<div class="row"><span class="lbl">Session admin</span><span class="val">' + badge(!!adminSess, '✓ Token présent', '✗ Non connecté') + '</span></div>';
}

function injectListing(){
  var listings = getLS('a2s_listings');
  listings.unshift({ id:Date.now(), make:'Cessna', model:'172 Skyhawk', year:'2019', price:'85000', currency:'EUR', category:'light', airport:'LFPG', desc:'Test diag', status:'pending', submittedAt:new Date().toISOString(), sellerName:'Test', sellerEmail:'test@aircraft2sell.eu', views:0, enquiries:0, icon:'✈' });
  setLS('a2s_listings', listings);
  refresh();
  alert('✓ Annonce test injectée (pending)');
}

function injectUser(){
  var users = getLS('a2s_users');
  var email = 'test'+Date.now().toString().slice(-4)+'@aircraft2sell.eu';
  users.unshift({ id:Date.now(), name:'Jean Dupont', email:email, plan:'Essentiel', status:'active', registeredAt:new Date().toISOString(), listings:0 });
  setLS('a2s_users', users);
  refresh();
  alert('✓ Membre test injecté');
}

function clearAll(){ if(confirm('Effacer TOUTES les données localStorage ?')){ ['a2s_listings','a2s_users','a2s_logged_in','a2s_user_name','a2s_user_email','a2s_user_plan'].forEach(function(k){ localStorage.removeItem(k); }); refresh(); } }
function clearListings(){ if(confirm('Effacer toutes les annonces ?')){ localStorage.removeItem('a2s_listings'); refresh(); } }
function clearUsers(){    if(confirm('Effacer tous les membres ?')){ localStorage.removeItem('a2s_users'); refresh(); } }

function testFullFlow(){
  var el = document.getElementById('flow-result');
  var steps = [], ok = true, ts = Date.now();
  if(typeof localStorage !== 'undefined') steps.push({ok:true, msg:'localStorage disponible'});
  else { steps.push({ok:false, msg:'localStorage non disponible'}); ok=false; }
  var test = {id:ts, make:'Test', model:'Diag', year:'2024', price:'50000', currency:'EUR', status:'pending', submittedAt:new Date().toISOString(), sellerName:'Test', sellerEmail:'diag@test.eu', views:0};
  var listings = getLS('a2s_listings');
  listings.unshift(test); setLS('a2s_listings', listings);
  steps.push({ok:true, msg:'Injection OK (id: '+ts+')'});
  var found = getLS('a2s_listings').find(function(l){ return String(l.id)===String(ts); });
  if(found) steps.push({ok:true, msg:'Relecture OK'});
  else { steps.push({ok:false, msg:'ERREUR: annonce non retrouvée'}); ok=false; }
  setLS('a2s_listings', getLS('a2s_listings').filter(function(l){ return String(l.id)!==String(ts); }));
  steps.push({ok:true, msg:'Nettoyage OK'});
  el.innerHTML = '<div style="font-size:.78rem">' + steps.map(function(s){
    return '<div style="padding:.3rem 0;display:flex;gap:.5rem"><span style="color:'+(s.ok?'#22c55e':'#ef4444')+'">'+(s.ok?'✓':'✗')+'</span><span style="color:'+(s.ok?'#f0f4f8':'#ef4444')+'">'+esc(s.msg)+'</span></div>';
  }).join('') + '<div style="margin-top:.8rem;font-weight:600;color:'+(ok?'#22c55e':'#ef4444')+'">'+(ok?'✅ Flux OK':'❌ Problème détecté')+'</div></div>';
  refresh();
}

function showRaw(){
  if (!_diagAuthed) return;
  var data = {};
  ['a2s_listings','a2s_users','a2s_logged_in','a2s_user_name','a2s_user_email'].forEach(function(k){
    try{ data[k]=JSON.parse(localStorage.getItem(k)); }catch(e){ data[k]=localStorage.getItem(k); }
  });
  /* Ne pas afficher les emails en clair dans la sortie brute */
  document.getElementById('raw-data').innerHTML = '<div class="code">' + esc(JSON.stringify(data, null, 2)) + '</div>';
}

async function checkSB(){
  if (!_diagAuthed) return;
  var el = document.getElementById('sb-status');
  try{
    var l = await sbGet('listings','limit=3&order=submitted_at.desc');
    var u = await sbGet('users','limit=3');
    el.innerHTML = '<div class="row"><span class="lbl">Listings</span><span class="val ok">'+l.length+' récents</span></div>'
      +'<div class="row"><span class="lbl">Users</span><span class="val ok">'+u.length+' récents</span></div>'
      +'<div class="row"><span class="lbl">Connexion</span><span class="val ok">✓ OK</span></div>';
  }catch(e){
    el.innerHTML = '<div class="row"><span class="lbl">Supabase</span><span class="val err">Erreur: '+esc(e.message)+'</span></div>';
  }
}
</script>
</body>
</html>
