<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aircraft2Sell — Buy & Sell Aircraft</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root{--sky:#0a0f1e;--deep:#060b15;--horizon:#0d2847;--horizon2:#0b1e38;--accent:#e8a020;--gold:#f5c842;--mist:#8fa3b8;--mist2:#5a7490;--white:#f0f4f8;--card-bg:#0e1a2e;--card2:#111f35;--border:rgba(200,212,224,0.1);--green:#22c55e;--red:#ef4444}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--sky);color:var(--white);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(1px 1px at 8% 15%,rgba(255,255,255,.7) 0%,transparent 100%),radial-gradient(1px 1px at 25% 65%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 42% 8%,rgba(255,255,255,.6) 0%,transparent 100%),radial-gradient(1px 1px at 60% 45%,rgba(255,255,255,.3) 0%,transparent 100%),radial-gradient(1px 1px at 78% 78%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(2px 2px at 15% 82%,rgba(255,255,255,.6) 0%,transparent 100%),radial-gradient(2px 2px at 52% 30%,rgba(255,255,255,.7) 0%,transparent 100%),radial-gradient(2px 2px at 84% 55%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1px 1px at 35% 92%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 95% 40%,rgba(255,255,255,.3) 0%,transparent 100%)}
nav{position:sticky;top:0;z-index:200;background:rgba(6,11,21,.94);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);height:64px;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.1em;color:var(--white);display:flex;align-items:center;gap:.5rem;flex-shrink:0;text-decoration:none}
.logo span{color:var(--accent)}
.logo-icon{font-size:1.4rem;transform:rotate(-10deg);display:inline-block;animation:flt 4s ease-in-out infinite}
@keyframes flt{0%,100%{transform:rotate(-10deg) translateY(0)}50%{transform:rotate(-10deg) translateY(-4px)}}
.nav-links{display:flex;gap:1.5rem;list-style:none;font-size:.82rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase}
.nav-links a{color:var(--mist);text-decoration:none;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--accent)}
.nav-right{display:flex;align-items:center;gap:.7rem;flex-shrink:0}
.lang-sw{display:flex;align-items:center;gap:2px;background:rgba(255,255,255,.04);border:1px solid var(--border);padding:3px}
.lb{background:none;border:none;color:var(--mist);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:600;padding:.28rem .45rem;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:3px;white-space:nowrap}
.lb:hover{color:var(--white)}
.lb.active{background:var(--accent);color:var(--deep)}
.lf{font-size:.9rem}
.btn-login{background:transparent;color:var(--mist);border:1px solid var(--border);padding:.5rem 1.1rem;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;letter-spacing:.06em;cursor:pointer;transition:all .2s;text-transform:uppercase;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;gap:.4rem}
.btn-login:hover{border-color:var(--accent);color:var(--accent)}
.btn-login .login-icon{font-size:.9rem}
.btn-post{background:var(--accent);color:var(--deep);border:none;padding:.5rem 1.1rem;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;letter-spacing:.06em;cursor:pointer;transition:background .2s,transform .15s;text-transform:uppercase;white-space:nowrap}
.btn-post:hover{background:var(--gold);transform:translateY(-1px)}
.nav-dropdown{position:relative}
.nav-dropdown>a{display:flex;align-items:center;gap:.3rem;cursor:pointer}
.nav-dropdown>a::after{content:'▾';font-size:.6rem;opacity:.6;transition:transform .2s}
.nav-dropdown:hover>a::after{transform:rotate(180deg)}
.dropdown-menu{position:absolute;top:100%;left:50%;transform:translateX(-50%);background:rgba(6,11,21,.98);backdrop-filter:blur(24px);border:1px solid var(--border);min-width:220px;opacity:0;pointer-events:none;transition:opacity .15s;z-index:500;padding-top:8px}
.dropdown-menu::before{content:'';position:absolute;top:-8px;left:0;right:0;height:8px}
.nav-dropdown:hover .dropdown-menu,.nav-dropdown.open .dropdown-menu{opacity:1;pointer-events:auto}
.nav-dropdown:hover>a::after,.nav-dropdown.open>a::after{transform:rotate(180deg)}

.dropdown-item{display:flex;align-items:center;gap:.7rem;padding:.65rem 1rem;color:var(--mist);font-size:.78rem;text-decoration:none;transition:all .15s;border-bottom:1px solid var(--border);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:400;letter-spacing:.02em;text-transform:none;white-space:nowrap}
.dropdown-item:last-child{border-bottom:none}
.dropdown-item:hover{color:var(--white);background:rgba(255,255,255,.04)}
.dropdown-item .di-icon{font-size:1rem;width:22px;text-align:center;flex-shrink:0}
.dropdown-item .di-name{flex:1}
.dropdown-item .di-count{font-size:.62rem;color:var(--mist2);margin-left:auto}
.dropdown-item.special{color:var(--accent)}
.dropdown-item.special:hover{background:rgba(232,160,32,.06)}
.dropdown-item.wanted{color:var(--mist2)}
.curr-conv{overflow:hidden}
.curr-hd{padding:.5rem .9rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.curr-hd-lbl{font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--mist2);font-weight:600}
.curr-live{font-size:.56rem;color:var(--green);display:flex;align-items:center;gap:.3rem}
.curr-live::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);animation:cvpulse 2s infinite;flex-shrink:0}
@keyframes cvpulse{0%,100%{opacity:1}50%{opacity:.3}}
.curr-bd{padding:.75rem .9rem}
.curr-row{display:flex;gap:0;margin-bottom:.45rem}
.cv-inp{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--white);padding:.65rem .75rem;font-family:'DM Sans',sans-serif;font-size:1.05rem;outline:none;min-width:0;transition:border-color .15s}
.cv-inp:focus{border-color:var(--accent)}
.cv-sel{background:rgba(255,255,255,.07);border:1px solid var(--border);border-left:none;color:var(--white);padding:.45rem .55rem;font-family:'DM Sans',sans-serif;font-size:.8rem;outline:none;cursor:pointer;min-width:76px;flex-shrink:0}
.cv-sel:focus{border-color:var(--accent);outline:none}
.cv-swap{text-align:center;padding:.25rem 0;cursor:pointer;color:var(--mist);font-size:1rem;user-select:none;transition:color .15s}
.cv-swap:hover{color:var(--accent)}
.cv-result{background:rgba(232,160,32,.07);border:1px solid rgba(232,160,32,.18);padding:.6rem .85rem;display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.cv-res-val{font-size:1.3rem;font-weight:600;color:var(--accent)}
.cv-res-sub{font-size:.6rem;color:var(--mist2);margin-top:.1rem}
.cv-rate{font-size:.63rem;color:var(--mist2);text-align:center;padding:.3rem 0 .15rem;border-top:1px solid var(--border)}
.cv-rate span{color:var(--mist)}
.cv-quick{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-top:.55rem}
.cv-qbtn{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--mist);padding:.3rem .25rem;font-size:.64rem;font-weight:600;cursor:pointer;text-align:center;letter-spacing:.04em;transition:all .12s;font-family:'DM Sans',sans-serif}
.cv-qbtn:hover,.cv-qbtn.cva{border-color:var(--accent);color:var(--accent);background:rgba(232,160,32,.06)}
.dropdown-divider{height:1px;background:var(--border);margin:0}
.hero{position:relative;z-index:1;min-height:90vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5rem 2rem 4rem;text-align:center;overflow:hidden}
.hero::before{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:2px;height:35%;background:linear-gradient(0deg,transparent,rgba(232,160,32,.5),transparent);animation:rnwy 3s ease-in-out infinite}
@keyframes rnwy{0%,100%{opacity:.4;height:28%}50%{opacity:1;height:40%}}
.hero-eyebrow{font-size:.72rem;letter-spacing:.3em;text-transform:uppercase;color:var(--accent);margin-bottom:1.5rem;font-weight:500;animation:fu .6s .1s both}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(4rem,9vw,8rem);letter-spacing:.04em;line-height:.88;color:var(--white);margin-bottom:1.8rem;animation:fu .6s .2s both}
.hero h1 em{font-style:normal;color:var(--accent)}
.hero-sub{color:var(--mist);font-size:1.05rem;font-weight:300;max-width:520px;margin:0 auto 2.8rem;line-height:1.7;animation:fu .6s .3s both}
@keyframes fu{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.hero-search{width:100%;max-width:820px;animation:fu .6s .4s both}
.search-wrap{background:var(--card-bg);border:1px solid var(--border);display:flex;flex-wrap:wrap;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.sf{flex:1;min-width:140px;padding:1rem 1.1rem;border:none;border-right:1px solid var(--border);background:transparent;color:var(--white);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none}
.sf::placeholder{color:var(--mist2)}
.sf:focus{background:rgba(255,255,255,.03)}
select.sf option{background:var(--card-bg)}
.sbtn{background:var(--accent);color:var(--deep);border:none;padding:1rem 2rem;font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:.1em;cursor:pointer;white-space:nowrap;transition:background .2s}
.sbtn:hover{background:var(--gold)}
.quick-filters{display:flex;gap:.5rem;margin-top:.8rem;flex-wrap:wrap;justify-content:center}
.qf{background:transparent;border:1px solid var(--border);color:var(--mist);padding:.3rem .8rem;font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.qf:hover,.qf.active{border-color:var(--accent);color:var(--accent);background:rgba(232,160,32,.07)}
.scroll-hint{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.4rem;opacity:.35;animation:bnc 2s infinite}
.scroll-hint span{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--mist)}
.scroll-arrow{width:18px;height:18px;border-right:1px solid var(--mist);border-bottom:1px solid var(--mist);transform:rotate(45deg)}
@keyframes bnc{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(6px)}}
.stats-bar{position:relative;z-index:1;background:var(--horizon);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:1.2rem 2rem;display:flex;justify-content:center;gap:3rem;flex-wrap:wrap}
.stat{text-align:center}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--accent);letter-spacing:.05em;line-height:1}
.stat-label{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--mist);margin-top:.2rem}
.burger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:.4rem;background:none;border:none;z-index:301;flex-shrink:0}
.burger span{display:block;width:22px;height:2px;background:var(--white);border-radius:2px;transition:all .25s}
.burger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.burger.open span:nth-child(2){opacity:0}
.burger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}

.ticker-wrap{background:var(--horizon2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);overflow:hidden;padding:.55rem 0;position:relative;z-index:1}
.ticker-track{display:flex;gap:3rem;animation:tick 35s linear infinite;white-space:nowrap}
.ticker-track:hover{animation-play-state:paused}
.ticker-item{font-size:.74rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mist);display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.ticker-item strong{color:var(--white);font-weight:500}
.ticker-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.section{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:4rem 2rem}
.section-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.08em}
.section-title em{font-style:normal;color:var(--accent)}
.see-all{font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);text-decoration:none;display:flex;align-items:center;gap:.4rem;transition:gap .2s;white-space:nowrap}
.see-all:hover{gap:.8rem}
.listings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:1px;background:var(--border);border:1px solid var(--border)}
.card{background:var(--card-bg);overflow:hidden;cursor:pointer;position:relative;display:flex;flex-direction:column;transition:transform .3s,box-shadow .3s;min-width:0}
.card:hover{transform:translateY(-5px);box-shadow:0 24px 60px rgba(0,0,0,.55);z-index:2}
.card-img{height:195px;position:relative;overflow:hidden;background:linear-gradient(135deg,#0d2847,#1a3a5c);display:flex;align-items:center;justify-content:center}
.plane-bg{font-size:5rem;opacity:.12;position:absolute;right:-1rem;bottom:-.5rem;transform:rotate(-15deg)}
.badge{position:absolute;top:.9rem;left:.9rem;padding:.22rem .6rem;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;font-weight:600}
.b-new{background:var(--accent);color:var(--deep)}
.b-urgent{background:#e84040;color:#fff}
.b-premium{background:linear-gradient(90deg,#b8860b,#f5c842);color:var(--deep)}
.b-sold{background:#333;color:#777}
.fav{position:absolute;top:.7rem;right:.7rem;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.12);color:var(--mist);width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.95rem;transition:all .2s;backdrop-filter:blur(8px)}
.fav:hover{color:#e84040;border-color:#e84040}
.fav.liked{color:#e84040;border-color:#e84040}
.urgency{position:absolute;bottom:.7rem;left:.9rem;font-size:.63rem;color:rgba(255,255,255,.65);display:flex;align-items:center;gap:.3rem;background:rgba(0,0,0,.5);padding:.2rem .5rem;backdrop-filter:blur(6px)}
.urgency-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pls 2s infinite;flex-shrink:0}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.25}}
.card-body{padding:1.3rem;flex:1;display:flex;flex-direction:column;gap:.7rem}
.card-cat{font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:600}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:1.45rem;letter-spacing:.04em;line-height:1.05;color:var(--white)}
.card-specs{display:flex;gap:1rem;flex-wrap:wrap}
.spec{display:flex;align-items:center;gap:.3rem;font-size:.76rem;color:var(--mist)}
.card-ft{display:flex;justify-content:space-between;align-items:flex-end;padding-top:.8rem;border-top:1px solid var(--border);margin-top:auto}
.price{font-family:'Bebas Neue',sans-serif;font-size:1.75rem;color:var(--gold);letter-spacing:.04em;line-height:1}
.price-sub{font-size:.68rem;color:var(--mist);letter-spacing:.08em;text-transform:uppercase;margin-top:.1rem}
.loc{display:flex;align-items:center;gap:.25rem;font-size:.74rem;color:var(--mist)}
.trust-chip{display:flex;align-items:center;gap:.3rem;font-size:.64rem;color:var(--green);border:1px solid rgba(34,197,94,.25);padding:.13rem .4rem;width:fit-content}
.featured-banner{grid-column:1/-1;background:linear-gradient(135deg,#0d2847 0%,#1a3a5c 55%,#0e2236 100%);border:1px solid rgba(232,160,32,.3);padding:2rem 2.5rem;display:flex;gap:2rem;align-items:center;flex-wrap:wrap;position:relative;overflow:hidden;cursor:pointer;transition:border-color .3s}
.featured-banner:hover{border-color:var(--accent)}
.featured-banner::after{content:'✈';position:absolute;right:4rem;top:50%;transform:translateY(-50%) rotate(-12deg);font-size:9rem;opacity:.05;pointer-events:none}
.feat-label{background:var(--accent);color:var(--deep);font-family:'Bebas Neue',sans-serif;font-size:.82rem;letter-spacing:.15em;padding:.28rem .75rem;align-self:flex-start;flex-shrink:0}
.feat-info{flex:1}
.feat-title{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;letter-spacing:.05em;color:var(--white);line-height:1;margin-bottom:.4rem}
.feat-specs{display:flex;gap:1.5rem;flex-wrap:wrap;margin-top:.7rem}
.feat-price{font-family:'Bebas Neue',sans-serif;font-size:3rem;color:var(--gold);letter-spacing:.05em;align-self:center;flex-shrink:0}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:1px;background:var(--border);border:1px solid var(--border)}
.cat-card{background:var(--card-bg);padding:1.6rem 1.2rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:.8rem;transition:background .2s,transform .25s;text-align:center;position:relative;overflow:hidden}
.cat-card::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform .3s}
.cat-card:hover::before{transform:scaleX(1)}
.cat-card:hover{background:var(--card2);transform:translateY(-3px)}
.cat-wanted{border:1px solid rgba(232,160,32,.25)!important;background:rgba(232,160,32,.04)!important}
.cat-wanted::before{background:var(--accent)}
.cat-wanted:hover{background:rgba(232,160,32,.1)!important}


.cat-icon{font-size:2.2rem;line-height:1}
.cat-name{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.08em;color:var(--white)}
.cat-count{font-size:.7rem;color:var(--mist);letter-spacing:.1em}
.trust-section{position:relative;z-index:1;background:var(--horizon2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:3.5rem 2rem}
.trust-inner{max-width:1100px;margin:0 auto}
.trust-title-el{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.08em;margin-bottom:2rem;text-align:center}
.trust-title-el em{font-style:normal;color:var(--accent)}
.trust-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:2rem}
.trust-item{display:flex;align-items:flex-start;gap:1rem}
.t-icon{font-size:2rem;flex-shrink:0;line-height:1}
.t-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.06em;color:var(--white);margin-bottom:.3rem}
.t-desc{font-size:.8rem;color:var(--mist);line-height:1.6}
.steps-section{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:4rem 2rem}
.steps-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem}
.steps-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1px;background:var(--border);border:1px solid var(--border)}
.step{background:var(--card-bg);padding:2rem 1.5rem;position:relative}
.step-num{font-family:'Bebas Neue',sans-serif;font-size:4rem;color:rgba(232,160,32,.15);line-height:1;margin-bottom:.8rem}
.step-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.06em;color:var(--white);margin-bottom:.5rem}
.step-desc{font-size:.82rem;color:var(--mist);line-height:1.6}
.alert-section{position:relative;z-index:1;background:linear-gradient(135deg,#0d2847,#0f1e38);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:4rem 2rem;text-align:center}
.alert-section::before{content:'🔔';font-size:2.8rem;display:block;margin-bottom:1rem;opacity:.5}
.alert-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.8rem,4vw,3rem);letter-spacing:.06em;color:var(--white);margin-bottom:.8rem}
.alert-title em{font-style:normal;color:var(--accent)}
.alert-sub{color:var(--mist);font-size:.95rem;font-weight:300;max-width:480px;margin:0 auto 2rem;line-height:1.6}
.alert-form{display:flex;max-width:540px;margin:0 auto;overflow:hidden;border:1px solid var(--border)}
.alert-input{flex:1;padding:1rem 1.2rem;border:none;background:var(--card-bg);color:var(--white);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none}
.alert-input::placeholder{color:var(--mist2)}
.alert-btn{background:var(--accent);color:var(--deep);border:none;padding:1rem 1.8rem;font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:.1em;cursor:pointer;white-space:nowrap;transition:background .2s}
.alert-btn:hover{background:var(--gold)}
.alert-note{font-size:.7rem;color:var(--mist2);margin-top:.8rem;letter-spacing:.06em}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;align-items:center;justify-content:center;padding:1.5rem;backdrop-filter:blur(12px)}
.modal-overlay.open{display:flex}
.modal{background:var(--card-bg);border:1px solid var(--border);max-width:740px;width:100%;max-height:92vh;overflow-y:auto;animation:sUp .3s ease}
@keyframes sUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-hd{padding:1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:1rem}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:1.85rem;letter-spacing:.06em}
.modal-close{background:none;border:1px solid var(--border);color:var(--mist);width:36px;height:36px;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{border-color:#e84040;color:#e84040}
.modal-body{padding:1.5rem}
.modal-img{height:270px;background:linear-gradient(135deg,#0d2847,#1a3a5c);display:flex;align-items:center;justify-content:center;font-size:8rem;color:rgba(255,255,255,.1);margin-bottom:1.5rem;position:relative}
.photo-dots{position:absolute;bottom:.8rem;left:50%;transform:translateX(-50%);display:flex;gap:.4rem}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.3)}
.dot.active{background:var(--accent)}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:1.5rem}
.detail-box{background:rgba(255,255,255,.03);border:1px solid var(--border);padding:.9rem}
.dl{font-size:.64rem;letter-spacing:.15em;text-transform:uppercase;color:var(--mist);margin-bottom:.25rem}
.dv{font-size:.95rem;color:var(--white);font-weight:500}

.modal-seller{display:flex;align-items:center;gap:.8rem;padding:1rem;background:rgba(255,255,255,.03);border:1px solid var(--border);margin-bottom:1.5rem}
.s-avatar{width:40px;height:40px;border-radius:50%;background:var(--horizon);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.s-name{font-weight:600;font-size:.88rem;color:var(--white)}
.s-verified{font-size:.68rem;color:var(--green);display:flex;align-items:center;gap:.2rem}
.s-meta{font-size:.72rem;color:var(--mist)}
.urg-row{display:flex;gap:1.5rem;padding:.75rem 1rem;background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.15);margin-bottom:1rem;flex-wrap:wrap}
.urg-item{display:flex;align-items:center;gap:.4rem;font-size:.76rem;color:rgba(255,255,255,.7)}
.modal-actions{display:flex;gap:.8rem}
.btn-cta{flex:1;background:var(--accent);color:var(--deep);border:none;padding:.95rem;font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:.1em;cursor:pointer;transition:background .2s}
.btn-cta:hover{background:var(--gold)}
.btn-sec{flex:1;background:transparent;color:var(--mist);border:1px solid var(--border);padding:.95rem;font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:.1em;cursor:pointer;transition:all .2s}
.btn-sec:hover{border-color:var(--accent);color:var(--accent)}
footer{position:relative;z-index:1;background:var(--deep);border-top:1px solid var(--border);padding:3.5rem 2rem 2rem}
.footer-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:2rem;margin-bottom:2.5rem}
.footer-brand .f-logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.12em;margin-bottom:.8rem}
.footer-brand .f-logo span{color:var(--accent)}
.footer-brand p{font-size:.82rem;color:var(--mist);line-height:1.65;max-width:260px}
.footer-col h4{font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:.1em;color:var(--white);margin-bottom:.8rem}
.footer-col ul{list-style:none;display:flex;flex-direction:column;gap:.4rem}
.footer-col a{color:var(--mist);text-decoration:none;font-size:.8rem;transition:color .2s}
.footer-col a:hover{color:var(--accent)}
.footer-bottom{max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:1.5rem;flex-wrap:wrap;gap:1rem}

.footer-langs button:hover,.footer-langs button.active{border-color:var(--accent);color:var(--accent)}
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--card-bg);border:1px solid var(--accent);padding:.9rem 1.4rem;color:var(--white);font-size:.86rem;z-index:999;opacity:0;transform:translateY(20px);transition:all .3s;pointer-events:none;max-width:300px}
.toast.show{opacity:1;transform:translateY(0)}

let cvFrom='EUR',cvTo='USD',cvAmount=100000,cvRate=null,cvLastUpdate=null,cvBusy=false;

async function cvFetch(){
  if(cvBusy)return;
  cvBusy=true;
  try{
    const r=await fetch('https://api.frankfurter.app/latest?base='+cvFrom+'&symbols='+cvTo);
    if(!r.ok)throw 0;
    const d=await r.json();
    cvRate=d.rates[cvTo]||1;
    cvLastUpdate=new Date();
  }catch(e){cvRate=null;}
  cvBusy=false;
  renderCurrencyPanel();
}

function cvCompute(){
  if(cvFrom===cvTo)return cvAmount;
  return cvRate?Math.round(cvAmount*cvRate*100)/100:null;
}

    +'<div class="curr-hd"><span class="curr-hd-lbl">'+title+'</span><span class="curr-live">'+live+(ts?' '+ts:'')+'</span></div>'
    +'<div class="curr-bd">'
    +'<div class="curr-row">'
    +'<input class="cv-inp" type="number" value="'+cvAmount+'" min="0" oninput="cvSetAmt(this.value)">'
    +'<select class="cv-sel" onchange="cvSetFrom(this.value)">'+CV_OPTS_FROM+'</select>'
    +'</div>'
    +'<div class="cv-swap" onclick="cvSwap()" title="'+swap+'">⇅</div>'
    +'<div class="cv-result">'
    +'<div><div class="cv-res-val">'+resStr+'</div><div class="cv-res-sub">BCE · Taux indicatif</div></div>'
    +'<select class="cv-sel" style="border-left:1px solid var(--border);background:rgba(232,160,32,.08);color:var(--accent)" onchange="cvSetTo(this.value)">'+CV_OPTS_TO+'</select>'
    +'</div>'
    +'<div class="cv-rate"><span>'+rateStr+'</span></div>'
    +'<div class="cv-quick">'+CV_QUICK+'</div>'
    +'</div></div>';

  const fs=menu.querySelector('.cv-sel');if(fs)fs.value=cvFrom;
  menu.querySelectorAll('.cv-qbtn').forEach(b=>b.classList.toggle('cva',b.textContent===cvTo));
  const icon=document.getElementById('currNavIcon');if(icon)icon.textContent=fSym;
}

function cvSetAmt(v){cvAmount=parseFloat(v)||0;renderCurrencyPanel();}
function cvSetFrom(v){cvFrom=v;cvRate=null;renderCurrencyPanel();cvFetch();}
function cvSetTo(v){cvTo=v;cvRate=null;renderCurrencyPanel();cvFetch();}
function setCvTo(v){cvSetTo(v);}
function cvSwap(){var t=cvFrom;cvFrom=cvTo;cvTo=t;cvRate=null;renderCurrencyPanel();cvFetch();}

function toggleCurrencyDropdown(e){
  e.preventDefault();
  var li=document.getElementById('currencyDropdownLi');
  li.classList.toggle('open');
  if(li.classList.contains('open')){
    renderCurrencyPanel();
    if(!cvRate&&!cvBusy)cvFetch();
    setTimeout(function(){
      document.addEventListener('click',function close(ev){
        if(!li.contains(ev.target)){li.classList.remove('open');document.removeEventListener('click',close);}
      });
    },0);
  }
}

function toggleCatDropdown(e){
  e.preventDefault();
  const li = document.getElementById('navCatLi');
  li.classList.toggle('open');
  // Close on outside click
  if(li.classList.contains('open')){
    setTimeout(()=>{
      document.addEventListener('click', function close(ev){
        if(!li.contains(ev.target)){li.classList.remove('open');document.removeEventListener('click',close);}
      });
    },0);
  }
}
function renderNavDropdown(){
  const menu = document.getElementById('navCatDropdown');
  if(!menu) return;
  const cats = t('cats');
  if(!cats||!Array.isArray(cats)) return;
  menu.innerHTML = cats.map(c=>{
    const cls = c.special?' special':c.wanted?' wanted':'';
    const href = c.url ? c.url : 'search.html?cat='+encodeURIComponent(c.name);
    const extra = c.wanted ? 'onclick="event.preventDefault();openWantedForm()" href=\"#\"' : '';
    return '<a class="dropdown-item'+cls+'" href="'+href+'" '+extra+'>'
      +'<span class="di-icon">'+c.icon+'</span>'
      +'<span class="di-name">'+c.name+'</span>'
      +'<span class="di-count">'+c.count+'</span>'
      +'</a>';
  }).join('');
}

function setLang(l){
  lang=l;document.documentElement.lang=l;
  document.querySelectorAll('.lb').forEach(b=>{b.classList.toggle('active',b.getAttribute('onclick').includes("'"+l+"'"));});
  document.querySelectorAll('.footer-langs button').forEach(b=>{b.classList.toggle('active',b.textContent.trim()===(l==='zh'?'中文':l.toUpperCase()));});
  document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=t(el.getAttribute('data-i18n'));});
  const bli=document.getElementById('btnLoginTxt');if(bli)bli.textContent=t('btnLogin');
  document.getElementById('searchInput').placeholder=t('search_placeholder');
  if(typeof updateBudgetCurr==='function')updateBudgetCurr();else document.getElementById('budgetInput').placeholder=t('budget_placeholder');
  document.getElementById('alertEmail').placeholder=t('alert_placeholder');
  document.getElementById('heroH1').innerHTML=t('hero_h1');
  document.getElementById('recentTitle').innerHTML=t('recent_title');
  document.getElementById('catTitle').innerHTML=t('cat_section_title');
  document.getElementById('trustTitle').innerHTML=t('trust_title');
  document.getElementById('stepsTitle').innerHTML=t('steps_title');
  document.getElementById('alertTitle').innerHTML=t('alert_title');
  const wt=document.getElementById('wantedTitle');if(wt)wt.innerHTML=t('wanted_section_title');
  const wft=document.getElementById('wantedFormTitle');if(wft)wft.innerHTML=t('wanted_form_title');
  document.title='Aircraft2Sell — '+(l==='en'?'Buy & Sell Aircraft':l==='fr'?"Achat & Vente d'Avions":l==='de'?'Flugzeuge kaufen & verkaufen':l==='es'?'Compra & Venta de Aeronaves':'飞机买卖平台');
  renderTicker();renderListings();renderCats();renderTrust();renderSteps();renderNavDropdown();
}

function animCount(el,target){let c=0;const s=Math.ceil(target/60);const i=setInterval(()=>{c=Math.min(c+s,target);el.textContent=c.toLocaleString();if(c>=target)clearInterval(i);},22);}
window.addEventListener('load',()=>{setTimeout(()=>{animCount(document.getElementById('sn1'),0);animCount(document.getElementById('sn2'),0);animCount(document.getElementById('sn3'),0);},500);});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
setLang('fr');
</script>
