<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aircraft2Sell — Pricing</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>:root{--sky:#0a0f1e;--deep:#060b15;--horizon:#0d2847;--horizon2:#0b1e38;--accent:#e8a020;--gold:#f5c842;--mist:#8fa3b8;--mist2:#5a7490;--white:#f0f4f8;--card-bg:#0e1a2e;--card2:#111f35;--border:rgba(200,212,224,0.1);--green:#22c55e;--red:#ef4444}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--sky);color:var(--white);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(1px 1px at 8% 15%,rgba(255,255,255,.7) 0%,transparent 100%),radial-gradient(1px 1px at 25% 65%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 42% 8%,rgba(255,255,255,.6) 0%,transparent 100%),radial-gradient(1px 1px at 60% 45%,rgba(255,255,255,.3) 0%,transparent 100%),radial-gradient(1px 1px at 78% 78%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(2px 2px at 15% 82%,rgba(255,255,255,.6) 0%,transparent 100%),radial-gradient(2px 2px at 52% 30%,rgba(255,255,255,.7) 0%,transparent 100%),radial-gradient(2px 2px at 84% 55%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1px 1px at 35% 92%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 95% 40%,rgba(255,255,255,.3) 0%,transparent 100%)}
nav{position:sticky;top:0;z-index:200;background:rgba(6,11,21,.94);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);height:64px;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.nav-links{display:flex;list-style:none;margin:0;padding:0;gap:1.5rem;align-items:center;height:64px;font-size:.82rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase}.nav-links li{display:flex;align-items:center;height:64px}.nav-links a{color:var(--mist);text-decoration:none;transition:color .2s;display:flex;align-items:center;height:64px;white-space:nowrap}.nav-links a:hover,.nav-links a.active{color:var(--accent)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.1em;color:var(--white);display:flex;align-items:center;gap:.5rem;flex-shrink:0;text-decoration:none}
.logo span{color:var(--accent)}
.logo-icon{font-size:1.4rem;transform:rotate(-10deg);display:inline-block;animation:flt 4s ease-in-out infinite}
@keyframes flt{0%,100%{transform:rotate(-10deg) translateY(0)}50%{transform:rotate(-10deg) translateY(-4px)}}



.nav-right{display:flex;align-items:center;gap:.7rem;flex-shrink:0}
.lang-sw{display:flex;align-items:center;gap:2px;background:rgba(255,255,255,.04);border:1px solid var(--border);padding:3px}
.lb{background:none;border:none;color:var(--mist);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:600;padding:.28rem .45rem;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:3px;white-space:nowrap}
.lb:hover{color:var(--white)}
.lb.active{background:var(--accent);color:var(--deep)}
.lf{font-size:.9rem}
.btn-login{background:transparent;color:var(--mist);border:1px solid var(--border);padding:.5rem 1.1rem;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;letter-spacing:.06em;cursor:pointer;transition:all .2s;text-transform:uppercase;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;gap:.4rem}
.btn-login:hover{border-color:var(--accent);color:var(--accent)}
.btn-login .login-icon{font-size:.9rem}
.btn-post{background:var(--accent);color:var(--deep);border:none;padding:.5rem 1.1rem;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;letter-spacing:.06em;cursor:pointer;transition:background .2s,transform .15s;text-transform:uppercase;white-space:nowrap}
.btn-post:hover{background:var(--gold);transform:translateY(-1px)}
.nav-dropdown{position:relative;align-items:center;display:flex}
.nav-dropdown>a{display:flex;align-items:center;gap:.3rem;cursor:pointer}
.nav-dropdown>a::after{content:'▾';font-size:.6rem;opacity:.6;transition:transform .2s}
.nav-dropdown:hover>a::after{transform:rotate(180deg)}
.dropdown-menu{position:absolute;top:100%;left:50%;transform:translateX(-50%);background:rgba(6,11,21,.98);backdrop-filter:blur(24px);border:1px solid var(--border);min-width:220px;opacity:0;pointer-events:none;transition:opacity .15s;z-index:500;padding-top:8px}
.dropdown-menu::before{content:'';position:absolute;top:-8px;left:0;right:0;height:8px}
.nav-dropdown:hover .dropdown-menu,.nav-dropdown.open .dropdown-menu{opacity:1;pointer-events:auto}
.nav-dropdown:hover>a::after,.nav-dropdown.open>a::after{transform:rotate(180deg)}

.dropdown-item{display:flex;align-items:center;gap:.7rem;padding:.65rem 1rem;color:var(--mist);font-size:.78rem;text-decoration:none;transition:all .15s;border-bottom:1px solid var(--border);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:400;letter-spacing:.02em;text-transform:none;white-space:nowrap}
.dropdown-item:last-child{border-bottom:none}
.dropdown-item:hover{color:var(--white);background:rgba(255,255,255,.04)}
.dropdown-item .di-icon{font-size:1rem;width:22px;text-align:center;flex-shrink:0}
.dropdown-item .di-name{flex:1}
.dropdown-item .di-count{font-size:.62rem;color:var(--mist2);margin-left:auto}
.dropdown-item.special{color:var(--accent)}
.dropdown-item.special:hover{background:rgba(232,160,32,.06)}
.dropdown-item.wanted{color:var(--mist2)}
.curr-conv{overflow:hidden}
.curr-hd{padding:.5rem .9rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.curr-hd-lbl{font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--mist2);font-weight:600}
.curr-live{font-size:.56rem;color:var(--green);display:flex;align-items:center;gap:.3rem}
.curr-live::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);animation:cvpulse 2s infinite;flex-shrink:0}
@keyframes cvpulse{0%,100%{opacity:1}50%{opacity:.3}}
.curr-bd{padding:.75rem .9rem}
.curr-row{display:flex;gap:0;margin-bottom:.45rem}
.cv-inp{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--white);padding:.65rem .75rem;font-family:'DM Sans',sans-serif;font-size:1.05rem;outline:none;min-width:0;transition:border-color .15s}
.cv-inp:focus{border-color:var(--accent)}
.cv-sel{background:rgba(255,255,255,.07);border:1px solid var(--border);border-left:none;color:var(--white);padding:.45rem .55rem;font-family:'DM Sans',sans-serif;font-size:.8rem;outline:none;cursor:pointer;min-width:76px;flex-shrink:0}
.cv-sel:focus{border-color:var(--accent);outline:none}
.cv-swap{text-align:center;padding:.25rem 0;cursor:pointer;color:var(--mist);font-size:1rem;user-select:none;transition:color .15s}
.cv-swap:hover{color:var(--accent)}
.cv-result{background:rgba(232,160,32,.07);border:1px solid rgba(232,160,32,.18);padding:.6rem .85rem;display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.cv-res-val{font-size:1.3rem;font-weight:600;color:var(--accent)}
.cv-res-sub{font-size:.6rem;color:var(--mist2);margin-top:.1rem}
.cv-rate{font-size:.63rem;color:var(--mist2);text-align:center;padding:.3rem 0 .15rem;border-top:1px solid var(--border)}
.cv-rate span{color:var(--mist)}
.cv-quick{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-top:.55rem}
.cv-qbtn{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--mist);padding:.3rem .25rem;font-size:.64rem;font-weight:600;cursor:pointer;text-align:center;letter-spacing:.04em;transition:all .12s;font-family:'DM Sans',sans-serif}
.cv-qbtn:hover,.cv-qbtn.cva{border-color:var(--accent);color:var(--accent);background:rgba(232,160,32,.06)}
.dropdown-divider{height:1px;background:var(--border);margin:0}
.hero{position:relative;z-index:1;min-height:90vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5rem 2rem 4rem;text-align:center;overflow:hidden}
.hero::before{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:2px;height:35%;background:linear-gradient(0deg,transparent,rgba(232,160,32,.5),transparent);animation:rnwy 3s ease-in-out infinite}
@keyframes rnwy{0%,100%{opacity:.4;height:28%}50%{opacity:1;height:40%}}
.hero-eyebrow{font-size:.72rem;letter-spacing:.3em;text-transform:uppercase;color:var(--accent);margin-bottom:1.5rem;font-weight:500;animation:fu .6s .1s both}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(4rem,9vw,8rem);letter-spacing:.04em;line-height:.88;color:var(--white);margin-bottom:1.8rem;animation:fu .6s .2s both}
.hero h1 em{font-style:normal;color:var(--accent)}
.hero-sub{color:var(--mist);font-size:1.05rem;font-weight:300;max-width:520px;margin:0 auto 2.8rem;line-height:1.7;animation:fu .6s .3s both}
@keyframes fu{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.hero-search{width:100%;max-width:820px;animation:fu .6s .4s both}
.search-wrap{background:var(--card-bg);border:1px solid var(--border);display:flex;flex-wrap:wrap;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.sf{flex:1;min-width:140px;padding:1rem 1.1rem;border:none;border-right:1px solid var(--border);background:transparent;color:var(--white);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none}
.sf::placeholder{color:var(--mist2)}
.sf:focus{background:rgba(255,255,255,.03)}
select.sf option{background:var(--card-bg)}
.sbtn{background:var(--accent);color:var(--deep);border:none;padding:1rem 2rem;font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:.1em;cursor:pointer;white-space:nowrap;transition:background .2s}
.sbtn:hover{background:var(--gold)}
.quick-filters{display:flex;gap:.5rem;margin-top:.8rem;flex-wrap:wrap;justify-content:center}
.qf{background:transparent;border:1px solid var(--border);color:var(--mist);padding:.3rem .8rem;font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.qf:hover,.qf.active{border-color:var(--accent);color:var(--accent);background:rgba(232,160,32,.07)}
.scroll-hint{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.4rem;opacity:.35;animation:bnc 2s infinite}
.scroll-hint span{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--mist)}
.scroll-arrow{width:18px;height:18px;border-right:1px solid var(--mist);border-bottom:1px solid var(--mist);transform:rotate(45deg)}
@keyframes bnc{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(6px)}}
.stats-bar{position:relative;z-index:1;background:var(--horizon);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:1.2rem 2rem;display:flex;justify-content:center;gap:3rem;flex-wrap:wrap}
.stat{text-align:center}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--accent);letter-spacing:.05em;line-height:1}
.stat-label{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--mist);margin-top:.2rem}
.burger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:.4rem;background:none;border:none;z-index:301;flex-shrink:0}
.burger span{display:block;width:22px;height:2px;background:var(--white);border-radius:2px;transition:all .25s}
.burger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.burger.open span:nth-child(2){opacity:0}
.burger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}

:root {
    --sky: #0a0f1e; --deep: #060b15; --horizon: #0d2847;
    --accent: #e8a020; --gold: #f5c842; --mist: #8fa3b8;
    --white: #f0f4f8; --card-bg: #0e1a2e; --border: rgba(200,212,224,0.12);
    --green: #22c55e; --red: #ef4444;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'DM Sans',sans-serif;background:var(--sky);color:var(--white);min-height:100vh;overflow-x:hidden}

  body::before{content:'';position:fixed;inset:0;background-image:
    radial-gradient(1px 1px at 10% 20%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 30% 70%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 50% 10%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 70% 50%,rgba(255,255,255,.25) 0%,transparent 100%),
    radial-gradient(1px 1px at 90% 80%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(2px 2px at 55% 25%,rgba(255,255,255,.6) 0%,transparent 100%),
    radial-gradient(2px 2px at 85% 45%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 20% 60%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 65% 85%,rgba(255,255,255,.4) 0%,transparent 100%);
    pointer-events:none;z-index:0}

  /* NAV */50%{transform:rotate(-10deg) translateY(-4px)}}

  /* HERO */
  .pricing-hero{position:relative;z-index:1;padding:4.5rem 2rem 3rem;text-align:center}
  .pricing-hero::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:500px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
  .hero-eyebrow{font-size:.72rem;letter-spacing:.28em;text-transform:uppercase;color:var(--accent);margin-bottom:1rem;font-weight:500}
  .pricing-hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.8rem,7vw,5.5rem);letter-spacing:.05em;line-height:.95;color:var(--white);margin-bottom:1rem}
  .pricing-hero h1 em{font-style:normal;color:var(--accent)}
  .pricing-hero p{color:var(--mist);font-size:1rem;font-weight:300;max-width:500px;margin:0 auto;line-height:1.65}

  /* BILLING TOGGLE */
  .billing-toggle{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;gap:1rem;margin:2.5rem auto 0;flex-wrap:wrap}
  .toggle-label{font-size:.85rem;color:var(--mist);font-weight:500}
  .toggle-label.active-label{color:var(--white)}
  .toggle-switch{width:52px;height:28px;background:var(--horizon);border:1px solid var(--border);border-radius:0;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
  .toggle-switch.on{background:var(--accent)}
  .toggle-knob{position:absolute;top:3px;left:3px;width:20px;height:20px;background:var(--white);transition:transform .2s;pointer-events:none}
  .toggle-switch.on .toggle-knob{transform:translateX(24px)}
  .save-badge{background:rgba(232,160,32,.15);border:1px solid rgba(232,160,32,.4);color:var(--accent);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;padding:.2rem .6rem;font-weight:600}

  /* PRICING GRID */
  .pricing-section{position:relative;z-index:1;max-width:1200px;margin:3rem auto 0;padding:0 2rem}

  .plans-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5px;background:var(--border);border:1px solid var(--border);margin-bottom:1.5px}

  .plan-card{background:var(--card-bg);padding:2rem;display:flex;flex-direction:column;position:relative;transition:transform .25s,box-shadow .25s}
  .plan-card:hover{transform:translateY(-6px);box-shadow:0 24px 60px rgba(0,0,0,.5);z-index:2}

  .plan-card.featured{background:linear-gradient(160deg,#0f1e3a 0%,#152840 100%);border:1px solid rgba(232,160,32,.35)}
  .plan-card.featured::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}

  .popular-tag{position:absolute;top:-1px;right:2rem;background:var(--accent);color:var(--deep);font-family:'Bebas Neue',sans-serif;font-size:.8rem;letter-spacing:.15em;padding:.25rem .7rem}

  .plan-icon{font-size:2rem;margin-bottom:1rem;line-height:1}
  .plan-name{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.08em;color:var(--white);margin-bottom:.4rem}
  .plan-tagline{font-size:.8rem;color:var(--mist);margin-bottom:1.5rem;line-height:1.5;min-height:2.4em}

  .plan-price{margin-bottom:1.5rem}
  .price-amount{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;color:var(--gold);letter-spacing:.02em;line-height:1}
  .price-amount.free-price{color:var(--green)}
  .price-period{font-size:.75rem;color:var(--mist);letter-spacing:.1em;text-transform:uppercase;margin-top:.2rem}
  .price-annual{font-size:.78rem;color:var(--accent);margin-top:.3rem;min-height:1.2em}

  .plan-divider{height:1px;background:var(--border);margin:0 0 1.5rem}

  .plan-features{list-style:none;display:flex;flex-direction:column;gap:.7rem;flex:1;margin-bottom:1.8rem}
  .plan-features li{display:flex;align-items:flex-start;gap:.6rem;font-size:.84rem;color:var(--mist);line-height:1.4}
  .feat-icon{flex-shrink:0;margin-top:.1rem;font-size:.85rem}
  .feat-icon.yes{color:var(--green)}
  .feat-icon.no{color:#3a4f62}
  .feat-text.highlight{color:var(--white);font-weight:500}

  .plan-cta{display:block;text-align:center;padding:.9rem 1.5rem;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.12em;cursor:pointer;transition:all .2s;text-decoration:none;border:none;width:100%}
  .cta-free{background:transparent;color:var(--mist);border:1px solid var(--border)}
  .cta-free:hover{border-color:var(--white);color:var(--white)}
  .cta-aviateur{background:var(--accent);color:var(--deep)}
  .cta-aviateur:hover{background:var(--gold)}
  .cta-pro{background:transparent;color:var(--accent);border:1px solid var(--accent)}
  .cta-pro:hover{background:rgba(232,160,32,.1)}

  /* ADD-ON */
  .addon-row{background:var(--card-bg);border:1px solid var(--border);padding:1.8rem 2rem;display:flex;align-items:center;gap:2rem;flex-wrap:wrap;transition:border-color .2s;margin-bottom:4rem}
  .addon-row:hover{border-color:rgba(232,160,32,.3)}
  .addon-badge{background:rgba(232,160,32,.12);border:1px solid rgba(232,160,32,.3);color:var(--accent);font-family:'Bebas Neue',sans-serif;font-size:.8rem;letter-spacing:.15em;padding:.3rem .8rem;flex-shrink:0}
  .addon-info{flex:1;min-width:220px}
  .addon-title{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;letter-spacing:.06em;color:var(--white);margin-bottom:.3rem}
  .addon-desc{font-size:.83rem;color:var(--mist);line-height:1.5}
  .addon-price-wrap{text-align:right;flex-shrink:0}
  .addon-price{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:var(--gold);letter-spacing:.04em;line-height:1}
  .addon-period{font-size:.72rem;color:var(--mist);letter-spacing:.1em;text-transform:uppercase}
  .addon-compatible{font-size:.72rem;color:var(--accent);margin-top:.2rem}
  .btn-addon{background:transparent;border:1px solid var(--border);color:var(--mist);padding:.6rem 1.4rem;font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:.1em;cursor:pointer;transition:all .2s;flex-shrink:0}
  .btn-addon:hover{border-color:var(--accent);color:var(--accent)}

  /* COMPARISON TABLE */
  .compare-section{position:relative;z-index:1;max-width:1000px;margin:0 auto 5rem;padding:0 2rem}
  .compare-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.08em;text-align:center;margin-bottom:2rem}
  .compare-title span{color:var(--accent)}

  .compare-table{width:100%;border-collapse:collapse;border:1px solid var(--border)}
  .compare-table th{background:var(--horizon);padding:1rem;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.1em;font-weight:400;border:1px solid var(--border)}
  .compare-table th:first-child{text-align:left;color:var(--mist)}
  .compare-table th:not(:first-child){text-align:center;color:var(--white)}
  .compare-table th.th-aviateur{color:var(--accent)}
  .compare-table td{padding:.85rem 1rem;border:1px solid var(--border);font-size:.83rem;background:var(--card-bg)}
  .compare-table td:first-child{color:var(--mist)}
  .compare-table td:not(:first-child){text-align:center;color:var(--white)}
  .compare-table tr:nth-child(even) td{background:rgba(255,255,255,.02)}
  .compare-table .section-row td{background:var(--horizon);color:var(--accent);font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:.1em;padding:.5rem 1rem}
  .check-yes{color:var(--green);font-size:1.1rem}
  .check-no{color:#3a4f62;font-size:1.1rem}
  .check-partial{color:var(--accent);font-size:.8rem;font-weight:600}

  /* FAQ */
  .faq-section{position:relative;z-index:1;max-width:720px;margin:0 auto 5rem;padding:0 2rem}
  .faq-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.08em;text-align:center;margin-bottom:2rem}
  .faq-title span{color:var(--accent)}
  .faq-item{border:1px solid var(--border);margin-bottom:1.5px;background:var(--card-bg);overflow:hidden}
  .faq-q{padding:1.1rem 1.3rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:.9rem;font-weight:500;gap:1rem;transition:background .2s}
  .faq-q:hover{background:rgba(255,255,255,.03)}
  .faq-arrow{font-size:1rem;color:var(--accent);flex-shrink:0;transition:transform .25s}
  .faq-item.open .faq-arrow{transform:rotate(180deg)}
  .faq-a{max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s}
  .faq-item.open .faq-a{max-height:200px;padding:0 1.3rem 1.1rem}
  .faq-a p{font-size:.84rem;color:var(--mist);line-height:1.7}

  /* FOOTER */
  footer{position:relative;z-index:1;background:var(--deep);border-top:1px solid var(--border);padding:3rem 2rem;text-align:center;margin-top:0}
  .footer-logo{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:.15em;margin-bottom:1rem}
  .footer-logo span{color:var(--accent)}
  .footer-links{display:flex;justify-content:center;gap:2rem;list-style:none;margin-bottom:2rem;flex-wrap:wrap}
  .footer-links a{color:var(--mist);text-decoration:none;font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;transition:color .2s}
  .footer-links a:hover{color:var(--accent)}
  .footer-copy{color:#3a4f62;font-size:.76rem;letter-spacing:.06em}

  /* TOAST */
  .toast{position:fixed;bottom:2rem;right:2rem;background:var(--card-bg);border:1px solid var(--accent);padding:1rem 1.5rem;color:var(--white);font-size:.88rem;z-index:999;opacity:0;transform:translateY(20px);transition:all .3s;pointer-events:none}
  .toast.show{opacity:1;transform:translateY(0)}

  /* ANIMATIONS */
  .fade-in{opacity:0;transform:translateY(20px);animation:fadeIn .5s forwards}
  @keyframes fadeIn{to{opacity:1;transform:translateY(0)}}
  .plan-card:nth-child(1){animation-delay:.1s}
  .plan-card:nth-child(2){animation-delay:.2s}
  .plan-card:nth-child(3){animation-delay:.3s}

  @media(max-width:860px){
    .plans-grid{grid-template-columns:1fr}
    .addon-row{flex-direction:column;text-align:center}
    .addon-price-wrap{text-align:center}
    .compare-table{font-size:.75rem}
    .compare-table td,.compare-table th{padding:.6rem .5rem}
  }
.nav-user{display:flex;align-items:center;gap:.5rem;cursor:default}
.nav-avatar{width:32px;height:32px;border-radius:50%;background:rgba(232,160,32,.15);border:1.5px solid rgba(232,160,32,.4);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.76rem;color:var(--accent);flex-shrink:0;text-transform:uppercase}
.nav-user-info{display:flex;flex-direction:column;line-height:1.2}
.nav-user-name{font-size:.78rem;font-weight:500;color:var(--white)}
.nav-user-plan{font-size:.58rem;color:var(--accent);letter-spacing:.06em;text-transform:uppercase}

const LISTINGS = [];

let lang='fr';
function t(k){return(T[lang]&&T[lang][k])||(T.en[k])||k}

function renderTicker(){
  const items=t('ticker_items');
  if(!items||!items.length){document.getElementById('ticker').innerHTML='<div class="ticker-item"><div class="ticker-dot"></div><span>No listings yet — be the first to post!</span></div>';return;}
  const dbl=[...items,...items];
  document.getElementById('ticker').innerHTML=dbl.map(i=>`<div class="ticker-item"><div class="ticker-dot"></div><span>${i}</span></div>`).join('');
}

function renderListings(){
  const g=document.getElementById('listingsGrid');
  if(!g) return;
  if(LISTINGS.length === 0){
    // Show skeleton loaders while waiting for DB
    g.innerHTML = Array(6).fill(0).map(()=>`
      <div class="card" style="pointer-events:none">
        <div class="card-img" style="background:linear-gradient(90deg,#0d1e38 25%,#1a2d4a 50%,#0d1e38 75%);background-size:200% 100%;animation:shimmer 1.5s infinite"></div>
        <div class="card-body" style="gap:.6rem">
          <div style="height:10px;width:60%;background:linear-gradient(90deg,#0d1e38 25%,#1a2d4a 50%,#0d1e38 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:2px"></div>
          <div style="height:14px;width:85%;background:linear-gradient(90deg,#0d1e38 25%,#1a2d4a 50%,#0d1e38 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:2px"></div>
          <div style="height:10px;width:50%;background:linear-gradient(90deg,#0d1e38 25%,#1a2d4a 50%,#0d1e38 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:2px"></div>
          <div style="margin-top:auto;padding-top:.8rem;border-top:1px solid var(--border);display:flex;justify-content:space-between">
            <div style="height:20px;width:35%;background:linear-gradient(90deg,#0d1e38 25%,#1a2d4a 50%,#0d1e38 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:2px"></div>
            <div style="height:10px;width:20%;background:linear-gradient(90deg,#0d1e38 25%,#1a2d4a 50%,#0d1e38 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:2px;align-self:center"></div>
          </div>
        </div>
      </div>`).join('');
    /* SUPABASE: replace skeletons with real data:
       const { data } = await supabase.from('listings').select('*').eq('status','approved').order('created_at',{ascending:false}).limit(6);
       LISTINGS.push(...data); renderListings(); */
    return;
  }
  g.innerHTML='';
  LISTINGS.forEach(l=>{
    if(l.featured){ const d=document.createElement('div'); d.className='featured-banner'; d.onclick=()=>openModal(l.id); d.innerHTML=`<div class="feat-label">${t('feat_label')}</div><div class="feat-info"><div class="card-cat">${t(l.catDisp)}</div><div class="feat-title">${l.title}</div><div class="feat-specs"><span class="spec">📅 ${l.year} · ${l.hours}</span><span class="spec">🛫 ${l.loc}</span><span class="spec">🪑 ${t('feat_pax')}</span></div></div><div class="feat-price">${l.price}</div>`; g.appendChild(d); return; }
    const c=document.createElement('div'); c.className='card'; c.onclick=()=>openModal(l.id);
    c.innerHTML=`<div class="card-img"><div class="plane-bg">${l.icon}</div>${l.badge?`<span class="badge ${l.badge}">${t(l.badgeKey)}</span>`:''}<button class="fav${l.liked?' liked':''}" onclick="event.stopPropagation();toggleFav(this)">${l.liked?'♥':'♡'}</button><div class="urgency"><span class="urgency-dot"></span>${l.views}${t('urgency_views')} · ${l.favs}${t('urgency_fav')}</div></div><div class="card-body"><div class="card-cat">${t(l.catDisp)}</div><div class="card-title">${l.title}</div><div class="card-specs"><span class="spec">📅 ${l.year}</span><span class="spec">⏱ ${l.hours}</span></div><div class="trust-chip">✓ ${t('seller_verified')}</div><div class="card-ft"><div><div class="price">${l.price}</div><div class="price-sub">${t(l.priceSub)}</div></div><div class="loc">📍 ${l.loc}</div></div></div>`;
    g.appendChild(c);
  });
}

function renderCats(){
  document.getElementById('catGrid').innerHTML=t('cats').map(c=>{
    if(c.wanted){
      return `<div class="cat-card cat-wanted" onclick="openWantedForm()">
        <div class="cat-icon">${c.icon}</div>
        <div class="cat-name" style="color:var(--accent)">${c.name}</div>
        <div class="cat-count">${c.count}</div>
      </div>`;
    }
    if(c.special){
      return `<div class="cat-card" style="border-color:rgba(232,160,32,.35);background:rgba(232,160,32,.05)" onclick="window.location.href='search.html'">
        <div class="cat-icon">${c.icon}</div>
        <div class="cat-name" style="color:var(--accent)">${c.name}</div>
        <div class="cat-count">${c.count}</div>
      </div>`;
    }
    if(c.special){
      return `<div class="cat-card" style="border-color:rgba(232,160,32,.35);background:rgba(232,160,32,.05);cursor:pointer" onclick="window.location.href='search.html'">
        <div class="cat-icon">${c.icon}</div>
        <div class="cat-name" style="color:var(--accent)">${c.name}</div>
        <div class="cat-count">${c.count}</div>
      </div>`;
    }
    return `<div class="cat-card" onclick="filterByCategory('${c.name}')">
      <div class="cat-icon">${c.icon}</div>
      <div class="cat-name">${c.name}</div>
      <div class="cat-count">${c.count}</div>
    </div>`;
  }).join('');
}

function filterByCategory(name){
  window.location.href='search.html?cat='+encodeURIComponent(name);
}

function openWantedForm(){
  /* ─── AUTH CHECK ──────────────────────────────────────────────
     In production with Supabase, replace this with:
     const { data: { user } } = await supabase.auth.getUser();
     const isLoggedIn = !!user;
     ─────────────────────────────────────────────────────────── */
  const isLoggedIn = false; // set to true after Supabase auth check

  if(!isLoggedIn){
    // Not logged in → redirect to login with return URL and message
    window.location.href='login.html?redirect=dashboard.html%23wanted&msg=wanted';
    return;
  }

  // Logged in → redirect to dashboard wanted section
  window.location.href='dashboard.html#wanted';
}

function renderTrust(){
  document.getElementById('trustGrid').innerHTML=t('trust_items').map(i=>
    `<div class="trust-item"><div class="t-icon">${i.icon}</div><div><div class="t-title">${i.title}</div><div class="t-desc">${i.desc}</div></div></div>`).join('');
}

function renderSteps(){
  const steps=t('steps');
  if(!steps||!Array.isArray(steps)) return;
  document.getElementById('stepsGrid').innerHTML=steps.map((s,i)=>
    `<div class="step">
      <div class="step-num">${s.num}</div>
      <div class="step-title">${s.title}</div>
      <div class="step-desc">${s.desc}</div>
      ${i<steps.length-1?'<div style="position:absolute;top:50%;right:-1px;transform:translateY(-50%);width:0;height:0;border-top:12px solid transparent;border-bottom:12px solid transparent;border-left:10px solid var(--border);z-index:1"></div>':''}
    </div>`).join('');
}

function openModal(id){
  const l=LISTINGS.find(x=>x.id===id);if(!l)return;
  document.getElementById('mTitle').textContent=l.title;
  document.getElementById('mImg').innerHTML=`<span style="font-size:8rem;opacity:.1">${l.icon}</span><div class="photo-dots"><div class="dot active"></div><div class="dot"></div><div class="dot"></div></div>`;
  document.getElementById('dModel').textContent=l.title;
  document.getElementById('dYear').textContent=l.year;
  document.getElementById('dHours').textContent=l.hours;
  document.getElementById('dLoc').textContent=l.loc;
  document.getElementById('dReg').textContent=l.reg;
  document.getElementById('dDoc').textContent=l.doc;
  document.getElementById('mDesc').textContent=t(l.desc);
  document.getElementById('mSeller').textContent=l.seller;
  const urg=document.getElementById('mUrg');
  if(l.id!=='c6'){
    urg.style.display='flex';
    urg.innerHTML=`<div class="urg-item">👁 <strong>${l.views}</strong> ${t('urgency_views')}</div><div class="urg-item">♡ <strong>${l.favs}</strong> ${t('urgency_fav')}</div><div class="urg-item">🕐 ${t('urgency_new')}${l.daysAgo===0?'today':l.daysAgo+'d ago'}</div>`;
  }else{urg.style.display='none';}
  document.querySelectorAll('#modal [data-i18n]').forEach(el=>{el.textContent=t(el.getAttribute('data-i18n'));});
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('modal').classList.remove('open');document.body.style.overflow='';}
function closeOut(e){if(e.target===document.getElementById('modal'))closeModal();}

const BUDGET_SYMS={'EUR':'€','USD':'$','GBP':'£','CHF':'Fr','CAD':'CA$','AUD':'AU$','JPY':'¥','CNY':'¥','HKD':'HK$','SEK':'kr','NOK':'kr','DKK':'kr','PLN':'zł','CZK':'Kč','HUF':'Ft','TRY':'₺','BRL':'R$','AED':'د.إ','INR':'₹','SGD':'S$','NZD':'NZ$','ZAR':'R','MXN':'MX$'};
function updateBudgetCurr(){
  const sel=document.getElementById('budgetCurr');
  const inp=document.getElementById('budgetInput');
  if(!sel||!inp)return;
  const sym=BUDGET_SYMS[sel.value]||sel.value;
  const baseLabel=t('budget_placeholder')||'Budget max';
  inp.placeholder=baseLabel+' ('+sym+')';
}
function qFilter(b){document.querySelectorAll('.qf').forEach(x=>x.classList.remove('active'));b.classList.add('active');}
function toggleFav(btn){btn.classList.toggle('liked');btn.textContent=btn.classList.contains('liked')?'♥':'♡';showToast(t(btn.classList.contains('liked')?'toast_fav_add':'toast_fav_remove'));}
function submitAlert(){const v=document.getElementById('alertEmail').value;if(v&&v.includes('@')){showToast(t('toast_alert'));document.getElementById('alertEmail').value='';}else showToast('⚠ Please enter a valid email');}
let tt;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),3000);}

/* -- CURRENCY CONVERTER v2 mini flottant -- */
const CV_SYMS={'EUR':'€','USD':'$','GBP':'£','CHF':'Fr','CAD':'CA$','AUD':'AU$','JPY':'¥','CNY':'¥','HKD':'HK$','SEK':'kr','NOK':'kr','DKK':'kr','PLN':'zł','CZK':'Kč','HUF':'Ft','TRY':'₺','BRL':'R$','AED':'د.إ','INR':'₹','SGD':'S$','NZD':'NZ$','ZAR':'R','MXN':'MX$','RUB':'₽'};
const CV_OPTS_FROM=`<option value="EUR">€ EUR</option><option value="USD">$ USD</option><option value="GBP">£ GBP</option><option value="CHF">Fr CHF</option><option value="CAD">CA$ CAD</option><option value="AUD">AU$ AUD</option><option value="JPY">¥ JPY</option><option value="CNY">¥ CNY</option><option value="HKD">HK$ HKD</option><option value="SEK">kr SEK</option><option value="NOK">kr NOK</option><option value="DKK">kr DKK</option><option value="PLN">zł PLN</option><option value="CZK">Kč CZK</option><option value="HUF">Ft HUF</option><option value="TRY">₺ TRY</option><option value="BRL">R$ BRL</option><option value="AED">د.إ AED</option><option value="INR">₹ INR</option><option value="SGD">S$ SGD</option><option value="NZD">NZ$ NZD</option><option value="ZAR">R ZAR</option><option value="MXN">MX$ MXN</option><option value="RUB">₽ RUB</option>`;
const CV_OPTS_TO=`<option value="EUR">€ EUR</option><option value="USD" selected>$ USD</option><option value="GBP">£ GBP</option><option value="CHF">Fr CHF</option><option value="CAD">CA$ CAD</option><option value="AUD">AU$ AUD</option><option value="JPY">¥ JPY</option><option value="CNY">¥ CNY</option><option value="HKD">HK$ HKD</option><option value="SEK">kr SEK</option><option value="NOK">kr NOK</option><option value="DKK">kr DKK</option><option value="PLN">zł PLN</option><option value="CZK">Kč CZK</option><option value="HUF">Ft HUF</option><option value="TRY">₺ TRY</option><option value="BRL">R$ BRL</option><option value="AED">د.إ AED</option><option value="INR">₹ INR</option><option value="SGD">S$ SGD</option><option value="NZD">NZ$ NZD</option><option value="ZAR">R ZAR</option><option value="MXN">MX$ MXN</option><option value="RUB">₽ RUB</option>`;
const CV_QUICK=`<button class="cv-qbtn" onclick="setCvTo('EUR')">EUR</button><button class="cv-qbtn" onclick="setCvTo('USD')">USD</button><button class="cv-qbtn" onclick="setCvTo('GBP')">GBP</button><button class="cv-qbtn" onclick="setCvTo('CHF')">CHF</button><button class="cv-qbtn" onclick="setCvTo('CAD')">CAD</button><button class="cv-qbtn" onclick="setCvTo('AUD')">AUD</button><button class="cv-qbtn" onclick="setCvTo('JPY')">JPY</button><button class="cv-qbtn" onclick="setCvTo('CNY')">CNY</button><button class="cv-qbtn" onclick="setCvTo('HKD')">HKD</button><button class="cv-qbtn" onclick="setCvTo('SEK')">SEK</button><button class="cv-qbtn" onclick="setCvTo('NOK')">NOK</button><button class="cv-qbtn" onclick="setCvTo('DKK')">DKK</button>`;
let cvFrom='EUR',cvTo='USD',cvAmount=100000,cvRate=null,cvLastUpdate=null,cvBusy=false;

async function cvFetch(){
  if(cvBusy)return;
  cvBusy=true;
  try{
    const r=await fetch('https://api.frankfurter.app/latest?base='+cvFrom+'&symbols='+cvTo);
    if(!r.ok)throw 0;
    const d=await r.json();
    cvRate=d.rates[cvTo]||1;
    cvLastUpdate=new Date();
  }catch(e){cvRate=null;}
  cvBusy=false;
  renderCurrencyPanel();
}

function cvCompute(){
  if(cvFrom===cvTo)return cvAmount;
  return cvRate?Math.round(cvAmount*cvRate*100)/100:null;
}

function renderCurrencyPanel(){
  const menu=document.getElementById('currencyDropdownMenu');
  if(!menu)return;
  const fSym=CV_SYMS[cvFrom]||cvFrom;
  const tSym=CV_SYMS[cvTo]||cvTo;
  const res=cvCompute();
  const resStr=res!=null?(tSym+(res>1?res.toLocaleString(undefined,{maximumFractionDigits:2}):res.toFixed(5))):'...';
  const rateStr=cvRate?'1 '+cvFrom+' = '+(Math.round(cvRate*100000)/100000)+' '+cvTo:'...';
  const ts=cvLastUpdate?cvLastUpdate.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';
  const live=lang==='fr'?'En direct':lang==='de'?'Aktuell':lang==='es'?'En vivo':lang==='zh'?'实时':'Live';
  const title=lang==='fr'?'Convertisseur':lang==='de'?'Währungsrechner':lang==='es'?'Divisas':lang==='zh'?'货币换算':'Currency';
  const swap=lang==='fr'?'Inverser':'Swap';

  menu.innerHTML=
    '<div class="curr-conv">'
    +'<div class="curr-hd"><span class="curr-hd-lbl">'+title+'</span><span class="curr-live">'+live+(ts?' '+ts:'')+'</span></div>'
    +'<div class="curr-bd">'
    +'<div class="curr-row">'
    +'<input class="cv-inp" type="number" value="'+cvAmount+'" min="0" oninput="cvSetAmt(this.value)">'
    +'<select class="cv-sel" onchange="cvSetFrom(this.value)">'+CV_OPTS_FROM+'</select>'
    +'</div>'
    +'<div class="cv-swap" onclick="cvSwap()" title="'+swap+'">⇅</div>'
    +'<div class="cv-result">'
    +'<div><div class="cv-res-val">'+resStr+'</div><div class="cv-res-sub">BCE · Taux indicatif</div></div>'
    +'<select class="cv-sel" style="border-left:1px solid var(--border);background:rgba(232,160,32,.08);color:var(--accent)" onchange="cvSetTo(this.value)">'+CV_OPTS_TO+'</select>'
    +'</div>'
    +'<div class="cv-rate"><span>'+rateStr+'</span></div>'
    +'<div class="cv-quick">'+CV_QUICK+'</div>'
    +'</div></div>';

  const fs=menu.querySelector('.cv-sel');if(fs)fs.value=cvFrom;
  menu.querySelectorAll('.cv-qbtn').forEach(b=>b.classList.toggle('cva',b.textContent===cvTo));
  const icon=document.getElementById('currNavIcon');if(icon)icon.textContent=fSym;
}

function cvSetAmt(v){cvAmount=parseFloat(v)||0;renderCurrencyPanel();}
function cvSetFrom(v){cvFrom=v;cvRate=null;renderCurrencyPanel();cvFetch();}
function cvSetTo(v){cvTo=v;cvRate=null;renderCurrencyPanel();cvFetch();}
function setCvTo(v){cvSetTo(v);}
function cvSwap(){var t=cvFrom;cvFrom=cvTo;cvTo=t;cvRate=null;renderCurrencyPanel();cvFetch();}

function toggleCurrencyDropdown(e){
  e.preventDefault();
  var li=document.getElementById('currencyDropdownLi');
  li.classList.toggle('open');
  if(li.classList.contains('open')){
    renderCurrencyPanel();
    if(!cvRate&&!cvBusy)cvFetch();
    setTimeout(function(){
      document.addEventListener('click',function close(ev){
        if(!li.contains(ev.target)){li.classList.remove('open');document.removeEventListener('click',close);}
      });
    },0);
  }
}

function toggleCatDropdown(e){
  e.preventDefault();
  const li = document.getElementById('navCatLi');
  li.classList.toggle('open');

  if(li.classList.contains('open')){
    setTimeout(()=>{
      document.addEventListener('click', function close(ev){
        if(!li.contains(ev.target)){li.classList.remove('open');document.removeEventListener('click',close);}
      });
    },0);
  }
}
function renderNavDropdown(){
  const menu = document.getElementById('navCatDropdown');
  if(!menu) return;
  const cats = t('cats');
  if(!cats||!Array.isArray(cats)) return;
  menu.innerHTML = cats.map(c=>{
    const cls = c.special?' special':c.wanted?' wanted':'';
    var _ck={'light aircraft':'light','business jets':'jet','turboprops':'turbo','helicopters':'heli','ultralight / ulm':'ulm','airliners':'airliner','spare parts':'parts'};
    const catCode = _ck[c.name.toLowerCase()] || c.name.toLowerCase().replace(/\s+/g,'-');
    const href = c.url ? c.url : 'search.html?cat='+catCode;
    const extra = c.wanted ? 'onclick="event.preventDefault();openWantedForm()" href=\"#\"' : '';
    return '<a class="dropdown-item'+cls+'" href="'+href+'" '+extra+'>'
      +'<span class="di-icon">'+c.icon+'</span>'
      +'<span class="di-name">'+c.name+'</span>'
      +'<span class="di-count">'+c.count+'</span>'
      +'</a>';
  }).join('');
}

function setLang(l){
  lang=l;document.documentElement.lang=l;
  document.querySelectorAll('.lb').forEach(function(b){if(b.getAttribute('onclick'))b.classList.toggle('active',b.getAttribute('onclick').includes("'"+l+"'"));});

  if(typeof renderTrust==='function')renderTrust();

  if(typeof renderNavDropdown==='function')renderNavDropdown();
}

function animCount(el,target){let c=0;const s=Math.ceil(target/60);const i=setInterval(()=>{c=Math.min(c+s,target);el.textContent=c.toLocaleString();if(c>=target)clearInterval(i);},22);}
window.addEventListener('load',()=>{setTimeout(()=>{animCount(document.getElementById('sn1'),0);animCount(document.getElementById('sn2'),0);animCount(document.getElementById('sn3'),0);},500);});

</script>

    plan_f2_5:'电子报 + 社交媒体发布',
    plan_f2_6:'精准广告投放',

    plan_f3_2:'无限同时广告',
    plan_f3_3:'每条广告无限照片',
    plan_f3_4:'优先置顶展示',
    plan_f3_5:'高级数据分析面板',

  }
};

function getFeatText(key){
  const map = FEAT_KEYS[lang] || FEAT_KEYS.en;
  return map[key] || key;
}

function renderFeatures(){
  [1,2,3].forEach(n=>{
    const ul = document.getElementById('features'+n);
    ul.innerHTML = '';
    FEATURES[n].forEach(f=>{
      const li = document.createElement('li');
      li.innerHTML = `<span class="feat-icon ${f.yes?'yes':'no'}">${f.yes?'✓':'✕'}</span><span class="feat-text ${f.hi?'highlight':''}">${getFeatText(f.text)}</span>`;
      ul.appendChild(li);
    });
  });
}

function updatePrices(){
  const p2m = 29, p3m = 79, addon = 10;
  if(isAnnual){
    document.getElementById('p1price').textContent = '0 €';
    document.getElementById('p2price').textContent = Math.round(p2m*12*0.8/12)+' €';
    document.getElementById('p3price').textContent = Math.round(p3m*12*0.8/12)+' €';
    document.getElementById('addonPrice').textContent = '+'+Math.round(addon*12*0.8/12)+' €';
    document.getElementById('p1annual').innerHTML = '&nbsp;';
    document.getElementById('p2annual').textContent = t('p2_annual');
    document.getElementById('p3annual').textContent = t('p3_annual');
  } else {
    document.getElementById('p1price').textContent = '0 €';
    document.getElementById('p2price').textContent = p2m+' €';
    document.getElementById('p3price').textContent = p3m+' €';
    document.getElementById('addonPrice').textContent = '+'+addon+' €';
    document.getElementById('p1annual').innerHTML = '&nbsp;';
    document.getElementById('p2annual').innerHTML = '&nbsp;';
    document.getElementById('p3annual').innerHTML = '&nbsp;';
  }
}

function renderCompare(){
  const rows = t('compare_rows');
  const tbody = document.getElementById('compareBody');
  tbody.innerHTML = '';
  rows.forEach(row=>{
    const tr = document.createElement('tr');
    if(row.section !== undefined){
      tr.className = 'section-row';
      tr.innerHTML = `<td colspan="4">${row.section}</td>`;
    } else {
      const isCheck = v => v==='✓';
      const isDash = v => v==='—';
      const cell = v => {
        if(isCheck(v)) return `<span class="check-yes">✓</span>`;
        if(isDash(v)) return `<span class="check-no">—</span>`;
        return `<span class="check-partial">${v}</span>`;
      };
      tr.innerHTML = `<td>${row.label}</td>${row.v.map(v=>
        `<td>${cell(v)}</td>`).join('')}`;
    }
    tbody.appendChild(tr);
  });
  document.getElementById('compareTitle').innerHTML = t('compare_title').replace(/(\w+)$/, '<span>$1</span>');
}

function renderFAQ(){
  const faqs = t('faqs');
  const container = document.getElementById('faqContainer');
  container.innerHTML = '';
  faqs.forEach((faq,i)=>{
    const div = document.createElement('div');
    div.className = 'faq-item';
    div.innerHTML = `
      <div class="faq-q" onclick="toggleFaq(this.parentElement)">
        <span>${faq.q}</span><span class="faq-arrow">▼</span>
      </div>
      <div class="faq-a"><p>${faq.a}</p></div>`;
    container.appendChild(div);
  });
  document.getElementById('faqTitle').innerHTML = t('faq_title').replace(/(\S+)$/, '<span>$1</span>');
}

function toggleFaq(el){
  el.classList.toggle('open');
}

function toggleBilling(){
  isAnnual = !isAnnual;
  const toggle = document.getElementById('billingToggle');
  toggle.classList.toggle('on', isAnnual);
  document.getElementById('monthlyLabel').classList.toggle('active-label', !isAnnual);
  document.getElementById('annualLabel').classList.toggle('active-label', isAnnual);
  updatePrices();
}


function requireLogin(e, dest){
  e.preventDefault();
  const isLoggedIn = localStorage.getItem('a2s_logged_in') === 'true';
  if(isLoggedIn){ window.location.href = dest; }
  else { window.location.href = 'login.html?redirect=' + encodeURIComponent(dest); }
}
function setLang(l){
  lang = l;
  document.documentElement.lang = l;
  document.querySelectorAll('.lb').forEach(b=>{b.classList.toggle('active',b.getAttribute('onclick').includes("'"+l+"'"));});
  const bli=document.getElementById('btnLoginTxt');
  if(bli){const ll={en:'Sign in',fr:'Connexion',de:'Anmelden',es:'Iniciar sesión',zh:'登录'};bli.textContent=ll[l]||'Connexion';}
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    el.textContent = t(el.getAttribute('data-i18n'));
  });
  document.getElementById('pricingH1').innerHTML = t('pricing_h1');
  document.title = 'Aircraft2Sell — '+t('nav_pricing');
  renderFeatures();
  updatePrices();
  renderCompare();
  renderFAQ();
}

let toastTimer;
function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2800);
}

// Boot
setLang('fr');
</script>
